<h1 class="title">木霊</h1>
<div class="main">
<div id="content">
<p>木霊（こだま）は<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>のひとつであり、また<a href="%E3%82%AD%E3%83%BC%E3%83%AF%E3%83%BC%E3%83%89%E8%83%BD%E5%8A%9B.html">キーワード能力</a>のひとつである。木霊を持つ自分のカードが<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>から<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>に置かれたとき、そのカードより低い（そのカード未満の）<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>を持つ、自分の<a href="%E6%89%8B%E6%9C%AD.html">手札</a>または墓地にある<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>1体を戦場に置くことができる。<a href="%E3%82%A4%E3%82%B8%E3%83%B3%E5%8F%AC%E5%96%9A%E6%A8%A9.html">イジン召喚権</a>は使わず、イジン召喚権が0でも発動できる。</p>
<h2 id="解説">解説</h2>
<p><a href="%E7%AC%AC3%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第3弾</a>で追加された、他のイジンを戦場に置ける遺業能力である。<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>であったカードのこの能力が発動すれば、戦況によっては相手の想定を狂わせることができる。</p>
