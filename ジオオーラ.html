<blockquote>
<p>3-68</p>
<p>ジオオーラ</p>
<p>マホウ／黄／2／魔力コスト1</p>
<p>1ドローする。</p>
<p>マホウ使用によって墓地に置かれる際「冥装」を得た状態で墓地に置かれる。</p>
<p>装備 : これが黄の間「ウォッチャー ブロック+2000」を得る。</p>
<p>遺業能力：魔力化</p>
</blockquote>
<p><a href="%E9%BB%84.html">黄</a>の<a href="%E3%82%AA%E3%83%BC%E3%83%A9%E3%83%9E%E3%83%9B%E3%82%A6.html">オーラマホウ</a>。<a href="%E5%86%A5%E8%A3%85.html">冥装</a>で[[装備]]させれば黄の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>に<a href="%E3%82%A6%E3%82%A9%E3%83%83%E3%83%81%E3%83%A3%E3%83%BC.html">ウォッチャー</a>と<a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AF%EF%BC%8B.html">ブロック＋</a>を与える。</p>
<p>カード名の「ジオ」は「地球」「地上」。</p>
