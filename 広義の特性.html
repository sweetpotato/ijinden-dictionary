<h1 class="title">広義の特性</h1>
<div class="main">
<div id="content">
<p>広義の特性とは、<a href="%E3%82%AB%E3%83%BC%E3%83%89%E3%81%8C%E6%8C%81%E3%81%A4%E6%83%85%E5%A0%B1.html">カードが持つ情報</a>のうち、ゲーム上の意味を持つものの相称である。具体的には次のとおり：</p>
<ul class="list1">
<li><a href="%E5%90%8D%E5%89%8D.html">名前</a>（カード名）</li>
<li><a href="%E7%A8%AE%E9%A1%9E.html">種類</a></li>
<li><a href="%E8%89%B2.html">色</a></li>
<li><a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a></li>
<li><a href="%E9%AD%94%E5%8A%9B%E3%82%B3%E3%82%B9%E3%83%88.html">魔力コスト</a></li>
<li><a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a></li>
<li>（狭義の）<a href="%E7%89%B9%E6%80%A7.html">特性</a></li>
<li><a href="%E3%83%AB%E3%83%BC%E3%83%AB%E3%83%86%E3%82%AD%E3%82%B9%E3%83%88.html">ルールテキスト</a></li>
<li><a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a></li>
</ul>
<h2 id="解説">解説</h2>
<p>広義の特性は<a href="%E8%A3%8F%E5%90%91%E3%81%8D.html">裏向き</a>のカードや[[装備]]を持つカードと関連がある。</p>
<p><a href="%E3%83%AB%E3%83%BC%E3%83%AB%E3%82%AB%E3%83%BC%E3%83%89.html">ルールカード</a>では広義の特性と（狭義の）特性がどちらも単に「特性」という言葉で記されている。適切に読み分けたい。</p>
