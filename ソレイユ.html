<h1 class="title">ソレイユ</h1>
<div class="main">
<div id="content">
<blockquote>
<p>4-57</p>
<p>ソレイユ</p>
<p>マホウ／黄／3／魔力コスト0</p>
<p>自分の墓地のイジンすべてを山札に戻してシャッフルする。自分の山札の上から1枚をめくって、そのカードがイジンなら手札に加える。</p>
<p>赤魔導 - 赤のカードが自分の戦場か自分の魔力ゾーンにあるなら、相手の墓地のマリョクでないカード3つまでを山札の下に戻す。</p>
<p>遺業能力：冥府発動</p>
</blockquote>
<p>自分の<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>すべてを<a href="%E5%B1%B1%E6%9C%AD.html">山札</a>に<a href="%E6%88%BB%E3%81%99.html">戻す</a><a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>。<a href="%E8%B5%A4%E9%AD%94%E5%B0%8E.html">赤魔導</a>で<a href="%E5%A2%93%E5%9C%B0%E5%AF%BE%E7%AD%96.html">墓地対策</a>もできる。</p>
<p>カード名は「太陽」。</p>
