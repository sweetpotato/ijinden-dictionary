<p>巨大古墳</p>
<p>ハイケイ／緑／2</p>
<p>自分のスタートフェイズが終了したとき、マリョク配置権+1する。</p>
<p>遺業能力：魔力化</p>
</blockquote>
<p><a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF%E5%8A%A0%E9%80%9F.html">マリョク加速</a>できる<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>。</p>
<p><a href="%E5%9F%B7%E7%AD%86.html">執筆</a>系のデッキでは1<a href="%E3%82%BF%E3%83%BC%E3%83%B3.html">ターン</a>目に出したい。<a href="%E3%83%8F%E3%83%AA%E3%82%A8%E3%83%83%E3%83%88%E3%83%BB%E3%83%93%E3%83%BC%E3%83%81%E3%83%A3%E3%83%BC%E3%83%BB%E3%82%B9%E3%83%88%E3%82%A6.html">ハリエット・ビーチャー・ストウ</a>を召喚してこれを使用できれば、早速1<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドローできる</a>上に、次のターンには<a href="%E9%AD%94%E5%8A%9B%E3%83%AC%E3%83%99%E3%83%AB.html">魔力レベル</a>6が狙えるので、<a href="%E6%B8%85%E5%B0%91%E7%B4%8D%E8%A8%80.html">清少納言</a>を召喚できる可能性につなげられる。</p>
