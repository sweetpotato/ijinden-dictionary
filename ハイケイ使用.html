<h1 class="title">ハイケイ使用</h1>
<div class="main">
<div id="content">
<p>ハイケイ使用とは、自分の<a href="%E3%83%A1%E3%82%A4%E3%83%B3%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">メインフェイズ</a>の間に<a href="%E6%89%8B%E6%9C%AD.html">手札</a>の<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>1つを<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>に置くことをいう。そのハイケイは<a href="%E8%89%B2%E6%9D%A1%E4%BB%B6.html">色条件</a>と<a href="%E3%83%AC%E3%83%99%E3%83%AB%E6%9D%A1%E4%BB%B6.html">レベル条件</a>を満たしている必要がある。</p>
<h2 id="解説">解説</h2>
<p>ハイケイを戦場に置く基本的な方法である。</p>
<p>ハイケイ使用では<a href="%E3%82%A4%E3%82%B8%E3%83%B3%E5%8F%AC%E5%96%9A%E6%A8%A9.html">イジン召喚権</a>も<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF%E9%85%8D%E7%BD%AE%E6%A8%A9.html">マリョク配置権</a>も使わない。そのため、1ターンにいくつでも手札から戦場に置くことができる。</p>
</div>
