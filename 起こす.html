<h1 class="title">起こす</h1>
<div class="main">
<div id="content">
<p><a href="%E6%88%A6%E5%A0%B4.html">戦場</a>のカードを「起こす」とは、<a href="%E5%AF%9D%E3%81%A6%E3%81%84%E3%82%8B.html">寝ている</a>カードを<a href="%E8%B5%B7%E3%81%8D%E3%81%A6%E3%81%84%E3%82%8B.html">起きている</a>状態にすることをいう。起きているカードをさらに起こすことはできない。<a href="%E3%82%AD%E3%83%BC%E3%83%AF%E3%83%BC%E3%83%89%E5%87%A6%E7%90%86.html">キーワード処理</a>のひとつである。</p>
<p>同様に、戦場のカードが「起きる」または「起きた」とは、寝ているカードが起きている状態になったことをいう。</p>
