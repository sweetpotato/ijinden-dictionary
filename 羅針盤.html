<blockquote>
<p>1-64</p>
<p>羅針盤</p>
<p>マリョク／青／1</p>
<p>イジン召喚によって「航海」を持つイジンが自分の戦場に置かれる際、魔力ゾーンに置かれているこれを、そのイジンに装備させてもよい。</p>
<p>装備 : 破壊されたとき、自分の魔力ゾーンのマリョク1つを墓地に置いて発動できる。これを破壊されていない状態にする。</p>
<p>遺業能力：復元</p>
</blockquote>
<p>[[装備]]で<a href="%E8%88%AA%E6%B5%B7.html">航海</a>を持つ<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>に<a href="%E7%A0%B4%E5%A3%8A%E8%80%90%E6%80%A7.html">破壊耐性</a>を与える<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>。</p>
<p>航海を持つか否かは<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>に置かれる前の状態で判定する。例えば戦場に<a href="%E8%B6%B3%E5%88%A9%E7%BE%A9%E6%BA%80.html">足利義満</a>がいても、元々航海を持たないイジンには装備させられない。</p>
