<h1 class="title">ドッペルゲンガー</h1>
<div class="main">
<div id="content">
<blockquote>
<p>4-60</p>
<p>ドッペルゲンガー</p>
<p>マホウ／紫／7／魔力コスト2</p>
<p>相手の手札を見て、相手の手札と戦場と墓地で、同じカード名を持つ、マリョクでないカードすべてを墓地に置く。</p>
<p>遺業能力：手札に戻す</p>
</blockquote>
<p>相手のカードを言わば「対消滅」させるマホウ。</p>
<p>大量除去の手段として[[千代コン]]に採用されることがある。</p>
<p>これにより<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>から<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>に置かれたカードの<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>は発動できる。</p>
<p>カード名は、自分とそっくりの姿をした分身を見る幻覚または超常現象のこと。</p>
