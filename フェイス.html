<h1 class="title">フェイス</h1>
<div class="main">
<div id="content">
<blockquote>
<p>2-60</p>
<p>フェイス</p>
<p>マホウ／青／2／魔力コスト1</p>
<p>自分の山札の上から1枚をガーディアンにして戦場に置く。</p>
<p>遺業能力：手札に戻す</p>
</blockquote>
<p><a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>を補充できる<a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>。</p>
<p><a href="%E9%9D%92%E5%8D%98%E9%97%98%E6%8A%80%E5%A0%B4.html">青単闘技場</a>では、<a href="%E5%86%86%E5%BD%A2%E9%97%98%E6%8A%80%E5%A0%B4.html">円形闘技場</a>とあわせて、<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>の数を増やすのに使われる。闘技場により<a href="%E5%8D%B3%E5%BF%9C.html">即応</a>を得るので、<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>に置かれたばかりのターンでもアタッカーになれる。</p>
<p>カード名は絵から推察するに「信仰（faith）」。祈りによって加護を得るイメージか。</p>
