<h1 class="title">バトル</h1>
<div class="main">
<div id="content">
<p>バトルとは自分の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>を相手の<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>やイジンと戦わせることであり、<a href="%E3%83%A1%E3%82%A4%E3%83%B3%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">メインフェイズ</a>の間に<a href="%E3%82%BF%E3%83%BC%E3%83%B3.html">ターン</a>に1回だけ宣言できる。そうしたなら、即座にバトルを開始する。</p>
<h2 id="ルール">ルール</h2>
<p>バトルの構成要素をステップという。バトルは次の3つのステップによって構成される：</p>
<ol class="list1">
<li><a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AF%E3%82%B9%E3%83%86%E3%83%83%E3%83%97.html">アタックステップ</a></li>
<li><a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AF%E3%82%B9%E3%83%86%E3%83%83%E3%83%97.html">ブロックステップ</a></li>
<li><a href="%E3%83%90%E3%83%88%E3%83%AB%E8%A7%A3%E6%B1%BA%E3%82%B9%E3%83%86%E3%83%83%E3%83%97.html">バトル解決ステップ</a></li>
</ol>
