<h1 class="title">マーブルストーン</h1>
<div class="main">
<div id="content">
<p>マーブルストーンとは次の<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>の俗称である：</p>
<ul class="list1">
<li><a href="RY%E3%83%9E%E3%83%BC%E3%83%96%E3%83%AB%E3%82%B9%E3%83%88%E3%83%BC%E3%83%B3.html">RYマーブルストーン</a>（<a href="%E8%B5%A4.html">赤</a>・<a href="%E9%BB%84.html">黄</a>）</li>
<li><a href="BY%E3%83%9E%E3%83%BC%E3%83%96%E3%83%AB%E3%82%B9%E3%83%88%E3%83%BC%E3%83%B3.html">BYマーブルストーン</a>（<a href="%E9%9D%92.html">青</a>・黄）</li>
<li><a href="GY%E3%83%9E%E3%83%BC%E3%83%96%E3%83%AB%E3%82%B9%E3%83%88%E3%83%BC%E3%83%B3.html">GYマーブルストーン</a>（<a href="%E7%B7%91.html">緑</a>・黄）</li>
</ul>
<h2 id="解説">解説</h2>
<p><a href="%E7%AC%AC2%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第2弾</a>に収録された、<a href="%E9%BB%84.html">黄</a>を含む2<a href="%E8%89%B2.html">色</a>で<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>1のマリョクである。いずれも<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>として<a href="%E5%BE%A9%E5%85%83.html">復元</a>を持つ。基本的な<a href="%E3%80%8E%E3%82%B9%E3%83%88%E3%83%BC%E3%83%B3%E3%80%8F%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">『ストーン』マリョク</a>の[[上位互換]]である。</p>
<p><a href="%E3%83%9E%E3%83%BC%E3%83%96%E3%83%AB%E3%82%AA%E3%83%BC%E3%83%96.html">マーブルオーブ</a>と比べてデメリットはないが、レベルが1なので<a href="%E9%AD%94%E5%8A%9B%E3%83%AC%E3%83%99%E3%83%AB.html">魔力レベル</a>の伸びは劣る。</p>
<p><a href="%E7%B4%AB.html">紫</a>・黄のマーブルストーンは存在しない。</p>
