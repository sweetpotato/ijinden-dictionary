<div class="main">
<div id="content">
<blockquote>
<p>2-51</p>
<p>リヴァイアサン</p>
<p>ハイケイ／青／4</p>
<p>特性：思想</p>
<p>相手がアタックしたとき、自分の戦場のイジンをすきなだけ起こして、ガーディアンにする。</p>
<p>遺業能力：手札に戻す</p>
</blockquote>
<p>自分の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>を<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>にできる<a href="%E6%80%9D%E6%83%B3.html">思想</a><a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>。</p>
<p>素直な使い方は疑似的な<a href="%E3%82%A6%E3%82%A9%E3%83%83%E3%83%81%E3%83%A3%E3%83%BC.html">ウォッチャー</a>だろうか。</p>
<p>カード名はトマス・ホッブズによる著書。なお、ホッブズは<a href="%E7%AC%AC5%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第5弾</a>現在ではまだカード化されていない。</p>
