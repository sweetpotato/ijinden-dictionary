<p>西郷頼母</p>
<p>イジン／黄／4</p>
<p>ウォッチャー</p>
<p>自分の戦場の他のイジンが破壊されるたびに発動する。このターンに限り「パワー+1000」を得る。</p>
<p>3500</p>
<p>遺業能力：1ドローする</p>
</blockquote>
<p>自分の他の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>が<a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊される</a>たび<a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>が上がるイジン。</p>
<p>相手の<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>に<a href="%E7%A0%B4%E5%A3%8A%E3%81%95%E3%82%8C%E3%81%AA%E3%81%84.html">破壊されない</a><a href="%E8%A6%AA%E9%B8%9E.html">親鸞</a>がいる状況で、[[大隈重信]]および<a href="%E3%83%90%E3%83%AC%E3%83%83%E3%83%88.html">バレット</a>と一緒に使えば、これのパワーを無限に上げられる。</p>
