<h1 class="title">打点</h1>
<div class="main">
<div id="content">
<p>打点とは、<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>が要求する<a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AB%E3%83%BC.html">ブロッカー</a>の数を指す俗語である。</p>
<h2 id="解説">解説</h2>
<p>通常のイジンは1打点、<a href="%E3%83%80%E3%83%96%E3%83%AB%E3%83%97%E3%83%AC%E3%83%83%E3%82%B7%E3%83%A3%E3%83%BC.html">ダブルプレッシャー</a>を持つなら2打点、<a href="%E5%86%86%E5%BD%A2%E9%97%98%E6%8A%80%E5%A0%B4.html">円形闘技場</a>は典型的には打点が4増える、といった具合に使う。</p>
