<h1 class="title">パワー＋</h1>
<div class="main">
<div id="content">
<blockquote>
<p>myWikiの制約上、ページ名に半角のプラス記号を使うとURLエスケープされて空白文字として扱われてしまうため、代わりに全角のプラス記号を用いる。</p>
</blockquote>
<p>パワー＋は<a href="%E5%B8%B8%E5%9C%A8%E5%9E%8B%E8%83%BD%E5%8A%9B.html">常在型能力</a>であり、また<a href="%E3%82%AD%E3%83%BC%E3%83%AF%E3%83%BC%E3%83%89%E8%83%BD%E5%8A%9B.html">キーワード能力</a>のひとつである。「パワー＋X」（Xは正の整数）を持つ<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>は、常に<a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>がX加算される。</p>
<h2 id="解説">解説</h2>
<p><a href="%E7%AC%AC1%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第1弾</a>から存在する、<a href="%E3%83%90%E3%83%88%E3%83%AB.html">バトル</a>の際の性能を上げる能力である。</p>
<h2 id="ルール">ルール</h2>
<p>パワー＋は重複する。何らかの理由で1体のイジンが2つ以上のパワー＋を得た場合、それらを合算して最終的なパワーを算出する。</p>
