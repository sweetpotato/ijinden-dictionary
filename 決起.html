<p>決起は<a href="%E8%83%BD%E5%8A%9B%E8%AA%9E.html">能力語</a>のひとつである。</p>
<h2 id="解説">解説</h2>
<p>典型的には「<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF%E9%85%8D%E7%BD%AE.html">マリョク配置</a>によってカードが自分の<a href="%E9%AD%94%E5%8A%9B%E3%82%BE%E3%83%BC%E3%83%B3.html">魔力ゾーン</a>に置かれたとき、自分の魔力ゾーンの<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>が4つ以上なら」発動する。</p>
<p>決起を軸にした<a href="%E3%83%87%E3%83%83%E3%82%AD.html">デッキ</a>には<a href="%E3%83%A1%E3%83%AD%E3%82%A6%E3%82%B9%E3%83%9A%E3%82%AF%E3%82%BF%E3%83%BC.html">メロウスペクター</a>や[[決起LO]]がある。</p>
