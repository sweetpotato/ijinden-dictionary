<h1 class="title">カード番号</h1>
<div class="main">
<div id="content">
<p>カード番号は<a href="%E3%82%AB%E3%83%BC%E3%83%89%E3%81%8C%E6%8C%81%E3%81%A4%E6%83%85%E5%A0%B1.html">カードが持つ情報</a>のひとつであり、<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>を一意に識別するためのIDである。</p>
<h2 id="解説">解説</h2>
<p>例えば<a href="%E4%BC%9D%E8%AA%AC%E3%81%AE%E6%AD%A6%E5%B0%86.html">伝説の武将</a>であれば「R-●」、<a href="%E7%AC%AC1%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第1弾ブースターパック</a>であれば「1-●」という形式のカード番号が振られている。</p>
