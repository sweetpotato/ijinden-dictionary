<h1 class="title">めくる</h1>
<div class="main">
<div id="content">
<p>カードを「めくる」とは、カードの表面をすべての<a href="%E3%83%97%E3%83%AC%E3%82%A4%E3%83%A4%E3%83%BC.html">プレイヤー</a>が見られる状態にすることをいう。<a href="%E3%82%AD%E3%83%BC%E3%83%AF%E3%83%BC%E3%83%89%E5%87%A6%E7%90%86.html">キーワード処理</a>のひとつである。</p>
<h2 id="解説">解説</h2>
<p><a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>の<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>を発動させる際、ガーディアンを戦場の位置から移動せずにそのまま表面を見せて行いがちだが、これは「めくる」ではなく、また正しい処理でもない。正しくは、<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>から<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>に置く、表面を公開する、遺業能力を発動させる、という順序である。</p>
