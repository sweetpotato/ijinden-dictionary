<p>2-48</p>
<p>一遍</p>
<p>イジン／黄／5</p>
<p>カードが自分の墓地にない間「ウォッチャー」を得る。</p>
<p>カードが相手の墓地にない間「トリプルプレッシャー」を得る。</p>
<p>5000</p>
<p>遺業能力：山札の上か下に戻す</p>
</blockquote>
<p>自分や相手の<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>がキレイなら能力を得られる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p><a href="%E5%A2%93%E5%9C%B0%E5%AF%BE%E7%AD%96.html">墓地対策</a>を併用して<a href="%E3%83%88%E3%83%AA%E3%83%97%E3%83%AB%E3%83%97%E3%83%AC%E3%83%83%E3%82%B7%E3%83%A3%E3%83%BC.html">トリプルプレッシャー</a>を狙いたいところだが、相手の墓地にひとたび<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>が置かれると、<a href="%E8%A6%AA%E9%B8%9E.html">親鸞</a>や<a href="%E3%83%AC%E3%82%AF%E3%82%A4%E3%82%A8%E3%83%A0.html">レクイエム</a>では対処できなくなるのが悩ましい。</p>
