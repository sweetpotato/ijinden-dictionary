<p>パイロオーラ</p>
<p>マホウ／赤／2／魔力コスト1</p>
<p>1ドローする。</p>
<p>マホウ使用によって墓地に置かれる際「冥装」を得た状態で墓地に置かれる。</p>
<p>装備 : これが赤の間「アタック+4000」を得る。</p>
<p>遺業能力：魔力化</p>
</blockquote>
<p><a href="%E8%B5%A4.html">赤</a>の<a href="%E3%82%AA%E3%83%BC%E3%83%A9%E3%83%9E%E3%83%9B%E3%82%A6.html">オーラマホウ</a>。<a href="%E5%86%A5%E8%A3%85.html">冥装</a>で[[装備]]させれば赤の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>に<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AF%EF%BC%8B.html">アタック＋</a>を与える。</p>
<p>カード名の「パイロ」は「火」。</p>
