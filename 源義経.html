<h1 class="title">源義経</h1>
<div class="main">
<div id="content">
<blockquote>
<p>R-2</p>
<p>源義経</p>
<p>イジン／赤／1</p>
<p>特性：剣術</p>
<p>即応</p>
<p>500</p>
<p>遺業能力：魔力化</p>
</blockquote>
<p><a href="%E5%8D%B3%E5%BF%9C.html">即応</a>持ちの<a href="%E5%89%A3%E8%A1%93.html">剣術</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p>1<a href="%E3%82%BF%E3%83%BC%E3%83%B3.html">ターン</a>目に召喚してすぐ<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>になれるので、<a href="%E8%B5%A4%E5%8D%98%E3%82%A2%E3%82%B0%E3%83%AD.html">赤単アグロ</a>の採用候補である。</p>
<p><a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>は500と低いので、<a href="%E5%BE%8C%E6%94%BB.html">後攻</a>の場合や2ターン目以降は相手の初動イジンに阻まれてしまう可能性が高い。<a href="%E9%80%A3%E3%81%AA%E3%82%8B%E5%A4%A9%E5%AE%88%E9%96%A3.html">連なる天守閣</a>などでパワーを上げたり、わざと<a href="%E3%83%90%E3%83%88%E3%83%AB.html">バトル</a>に負けて<a href="%E9%AD%94%E5%8A%9B%E5%8C%96.html">魔力化</a>して次の高<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>な<a href="%E3%82%AB%E3%83%BC%E3%83%89%E3%82%92%E4%BD%BF%E3%81%86.html">カードの使用</a>につなげたりしたい。</p>
