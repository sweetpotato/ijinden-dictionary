<h1 class="title">消耗</h1>
<div class="main">
<div id="content">
<p>消耗は<a href="%E5%B8%B8%E5%9C%A8%E5%9E%8B%E8%83%BD%E5%8A%9B.html">常在型能力</a>であり、また<a href="%E3%82%AD%E3%83%BC%E3%83%AF%E3%83%BC%E3%83%89%E8%83%BD%E5%8A%9B.html">キーワード能力</a>のひとつである。消耗を持つカードは<a href="%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%88%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">スタートフェイズ</a>で裏にする。</p>
<h2 id="解説">解説</h2>
<p><a href="%E7%AC%AC5%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第5弾</a>で追加された、一定期間を過ぎたら力が失われる能力である。</p>
<p>第5弾現在、消耗を持つカードはいずれも<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>である。</p>
<h2 id="ルール">ルール</h2>
<p>消耗は重複しない。何らかの理由で1つのカードが2つ以上のドレインを得ても、1つだけ得た場合と変わりはない。</p>
