<h1 class="title">テンペスト</h1>
<div class="main">
<div id="content">
<blockquote>
<p>2-62</p>
<p>テンペスト</p>
<p>マホウ／青／4／魔力コスト1</p>
<p>相手の戦場の寝ているイジンすべてを手札に戻す。</p>
<p>遺業能力：冥府発動</p>
</blockquote>
<p>相手の<a href="%E5%AF%9D%E3%81%A6%E3%81%84%E3%82%8B.html">寝ている</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>すべてを<a href="%E6%89%8B%E6%9C%AD.html">手札</a>に<a href="%E6%88%BB%E3%81%99.html">戻す</a><a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>。</p>
<p><a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>から<a href="%E5%86%A5%E5%BA%9C%E7%99%BA%E5%8B%95.html">冥府発動</a>できれば、典型的にはこれ1枚で<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>すべてを追い払うことができる。</p>
<p><a href="%E3%82%B0%E3%82%B9%E3%82%BF%E3%83%952%E4%B8%96%E3%82%A2%E3%83%89%E3%83%AB%E3%83%95.html">グスタフ2世アドルフ</a>や<a href="%E3%83%94%E3%83%BC%E3%82%B3%E3%83%83%E3%82%AF.html">ピーコック</a>など、相手のイジンを<a href="%E5%AF%9D%E3%81%8B%E3%81%9B%E3%82%8B.html">寝かせる</a>カードと相性が良い。このことから<a href="%E3%82%B0%E3%82%B9%E3%82%BF%E3%83%95%E3%83%86%E3%83%B3%E3%83%9D.html">グスタフテンポ</a>に採用される。</p>
<p>カード名は「大嵐」。<a href="%E3%82%B9%E3%83%88%E3%83%BC%E3%83%A0.html">ストーム</a>と同様に、強風で吹き飛ばすイメージか。</p>
