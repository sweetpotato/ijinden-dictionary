<p>フランシスコ・ザビエル</p>
<p>イジン／青／4</p>
<p>航海 - アタッカーになったとき、自分の山札の上から1枚をガーディアンにして戦場に置く。</p>
<p>1000</p>
</blockquote>
<p><a href="%E8%88%AA%E6%B5%B7.html">航海</a>で<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>を補充できる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p><a href="%E5%86%86%E5%BD%A2%E9%97%98%E6%8A%80%E5%A0%B4.html">円形闘技場</a>とは相性が良いように見えるが、<a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>が1000と低いので、相手の大きなイジンに阻まれがちである。また、これの航海が発動するときには既に<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>の選択は過ぎているので、戦場に置かれたガーディアンがアタッカーになれるのは次の相手のターンになる。</p>
