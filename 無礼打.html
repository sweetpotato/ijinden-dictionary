<blockquote>
<p>4-41</p>
<p>無礼打</p>
<p>ハイケイ／赤／3</p>
<p>レベル2以下の赤でないイジンが戦場に置かれたときに発動できる。そのイジンを破壊して、これを墓地に置く。</p>
<p>遺業能力：1ドローする</p>
</blockquote>
<p><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>を<a href="%E9%99%A4%E5%8E%BB.html">除去</a>できる<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>。ただしレベル2以下の赤でないイジンに限る。</p>
<p>レベル2以下のイジンは典型的には1ターン目に召喚されるが、このハイケイはレベル3であり使用できるのが2ターン目のため、ターンが噛み合わないのが難点。</p>
