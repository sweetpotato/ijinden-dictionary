<h1 class="title">マッチ戦</h1>
<div class="main">
<div id="content">
<p>マッチ戦は<a href="%E3%82%AA%E3%83%97%E3%82%B7%E3%83%A7%E3%83%B3%E3%83%AB%E3%83%BC%E3%83%AB.html">オプションルール</a>のひとつである。採用する場合、1マッチで<a href="%E3%82%B2%E3%83%BC%E3%83%A0.html">ゲーム</a>を最大3回行い、先に2回勝利した<a href="%E3%83%97%E3%83%AC%E3%82%A4%E3%83%A4%E3%83%BC.html">プレイヤー</a>をマッチの勝者とする。俗に「BO3」とも呼ばれる。</p>
<h2 id="解説">解説</h2>
<p>いわゆる「3本勝負の2本先取」であり、まぐれ勝ちを均すためのルールである。</p>
<h2 id="ルール">ルール</h2>
<p>マッチ戦を採用する場合、追加で<a href="%E3%82%B5%E3%82%A4%E3%83%89%E3%83%87%E3%83%83%E3%82%AD.html">サイドデッキ</a>のオプションルールも採用できる。</p>
<p>マッチ戦であるか否かによって、ゲームの開始の際に<a href="%E5%85%88%E6%94%BB.html">先攻</a>・<a href="%E5%BE%8C%E6%94%BB.html">後攻</a>を決める方法が異なる。詳細は<a href="%E3%82%B2%E3%83%BC%E3%83%A0.html">ゲーム</a>の項目を参照されたい。</p>
</div>
