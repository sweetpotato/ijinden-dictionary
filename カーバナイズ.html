<p>4-51</p>
<p>カーバナイズ</p>
<p>マホウ／赤／1／魔力コスト1</p>
<p>戦場のハイケイ1つか、戦場の装備されているカード1つを指定して発動できる。そのカードを破壊する。この能力によって破壊されたカードは、墓地に置かれる代わりに山札の下に戻される。</p>
<p>遺業能力：冥府発動</p>
</blockquote>
<p><a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>または[[装備]]されているカードを<a href="%E5%B1%B1%E6%9C%AD%E3%81%AE%E4%B8%8B.html">山札の下</a>に<a href="%E6%88%BB%E3%81%99.html">戻す</a><a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>。</p>
<p>カード名は「炭化」。高温により変性させるイメージか。</p>
