<h1 class="title">先攻</h1>
<div class="main">
<div id="content">
<p>先攻とは最初に<a href="%E3%82%BF%E3%83%BC%E3%83%B3.html">ターン</a>を始めること、またはその<a href="%E3%83%97%E3%83%AC%E3%82%A4%E3%83%A4%E3%83%BC.html">プレイヤー</a>をいう。先攻の反対は<a href="%E5%BE%8C%E6%94%BB.html">後攻</a>である。</p>
<h2 id="解説">解説</h2>
<p>後攻よりも先に<a href="%E3%82%AB%E3%83%BC%E3%83%89%E3%82%92%E4%BD%BF%E3%81%86.html">カードを使える</a>代わりに、先攻1ターン目の<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">ドローフェイズ</a>では<a href="%E5%B1%B1%E6%9C%AD.html">山札</a>から引くことができない。</p>
<p><a href="%E5%BE%8C%E6%94%BB%E3%83%89%E3%83%AD%E3%83%BC2.html">後攻ドロー2</a>の<a href="%E3%82%AA%E3%83%97%E3%82%B7%E3%83%A7%E3%83%B3%E3%83%AB%E3%83%BC%E3%83%AB.html">オプションルール</a>を採用するか否かによって、後攻との有利・不利の度合いが変わってくる。</p>
</div>
