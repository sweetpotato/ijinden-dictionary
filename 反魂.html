<h1 class="title">反魂</h1>
<div class="main">
<div id="content">
<p>反魂（はんごん）は<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>のひとつであり、また<a href="%E3%82%AD%E3%83%BC%E3%83%AF%E3%83%BC%E3%83%89%E8%83%BD%E5%8A%9B.html">キーワード能力</a>のひとつである。反魂を持つイジンが<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>から<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>に置かれたとき、自分の戦場の<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>1体を<a href="%E8%A3%8F%E5%90%91%E3%81%8D.html">裏向き</a>のまま<a href="%E5%B1%B1%E6%9C%AD%E3%81%AE%E4%B8%8B.html">山札の下</a>に戻して発動できる。そのイジンを墓地から戦場に置く。<a href="%E3%82%A4%E3%82%B8%E3%83%B3%E5%8F%AC%E5%96%9A%E6%A8%A9.html">イジン召喚権</a>は使わず、イジン召喚権が0でも発動できる。</p>
<h2 id="解説">解説</h2>
<p><a href="%E7%AC%AC2%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第2弾</a>で追加された、イジンを復活できる遺業能力である。</p>
<h2 id="ルール">ルール</h2>
<p>ガーディアンを山札の下に戻すことは[[発動の手続]]である。したがって、戻せない場合は発動できない。</p>
