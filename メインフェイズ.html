<div class="main">
<div id="content">
<blockquote>
<p><a href="%E3%82%BF%E3%83%BC%E3%83%B3.html">ターン</a> ＝ <a href="%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%88%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">スタートフェイズ</a> → <a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">ドローフェイズ</a> → <strong>メインフェイズ</strong> → <a href="%E3%82%A8%E3%83%B3%E3%83%89%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">エンドフェイズ</a></p>
</blockquote>
<p>メインフェイズはターンを構成するフェイズのひとつであり、<a href="%E3%82%BF%E3%83%BC%E3%83%B3%E3%83%97%E3%83%AC%E3%82%A4%E3%83%A4%E3%83%BC.html">ターンプレイヤー</a>は次の行動を任意の順序で、条件が許す限り任意の回数だけ行うことができる。ただし、最後には「メインフェイズの終了を宣言する」必要がある。</p>
<ul class="list1">
<li><a href="%E3%82%AB%E3%83%BC%E3%83%89%E3%82%92%E4%BD%BF%E3%81%86.html">カードを使う</a></li>
<li><a href="%E3%83%90%E3%83%88%E3%83%AB.html">バトル</a>を宣言する（ターンに1回だけ）</li>
<li>メインフェイズの終了を宣言する</li>
</ul>
<h2 id="解説">解説</h2>
<p>ゲームの主要な行動をするフェイズである。</p>
