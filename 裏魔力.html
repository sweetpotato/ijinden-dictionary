<h1 class="title">裏魔力</h1>
<div class="main">
<div id="content">
<p>裏魔力とは、<a href="%E9%AD%94%E5%8A%9B%E3%82%BE%E3%83%BC%E3%83%B3.html">魔力ゾーン</a>に<a href="%E8%A3%8F%E5%90%91%E3%81%8D.html">裏向き</a>で置かれている<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>を指す俗語である。</p>
<h2 id="解説">解説</h2>
<p><a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF%E9%85%8D%E7%BD%AE.html">マリョク配置</a>で<a href="%E6%89%8B%E6%9C%AD.html">手札</a>から裏向きで置かれたり、<a href="%E7%A8%AE.html">種</a>マリョクで<a href="%E5%B1%B1%E6%9C%AD%E3%81%AE%E4%B8%8A.html">山札の上</a>から裏向きで置かれたりしたカードなどが該当する。</p>
<p>裏魔力は<a href="%E5%BA%83%E7%BE%A9%E3%81%AE%E7%89%B9%E6%80%A7.html">広義の特性</a>を持たない。したがって<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>も<a href="%E8%89%B2.html">色</a>も持たない。<a href="%E9%AD%94%E5%8A%9B%E3%83%AC%E3%83%99%E3%83%AB.html">魔力レベル</a>を計算する際は、表面が何であれ、常に1と換算される。</p>
