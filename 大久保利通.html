<blockquote>
<p>4-13</p>
<p>大久保利通</p>
<p>イジン／赤／5</p>
<p>自分がイジン1体だけでアタックしたとき、そのイジンがレベル6以上なら発動する。アタッカーすべては、このターンに限り「イジンにブロックされない」を得る。</p>
<p>5000</p>
</blockquote>
<p><a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>6以上の単騎<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>をイジンにブロックされなくするイジン。</p>
<p><a href="%E8%A5%BF%E9%83%B7%E9%9A%86%E7%9B%9B.html">西郷隆盛</a>と一緒に使えば、イジンにブロックされないモータル持ちの<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>が完成する。<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>から<a href="%E5%86%A5%E5%BA%9C%E7%99%BA%E5%8B%95.html">冥府発動</a>や<a href="%E5%96%AA%E7%A5%9E.html">喪神</a>が発動しなければ、1回のアタックで勝負を決めることができる。</p>
