<h1 class="title">ラ・コロール</h1>
<div class="main">
<div id="content">
<blockquote>
<p>4-72</p>
<p>ラ・コロール</p>
<p>マリョク／黄／1</p>
<p>魔力ゾーンに置かれたとき、戦場のレベル2以下のイジン1体を指定して発動できる。そのイジンを山札の下に戻す。自分は、このターンに限り「バトルできない」を得る。</p>
<p>遺業能力：復元</p>
</blockquote>
<p><a href="%E9%99%A4%E5%8E%BB.html">除去</a>能力付きの<a href="%E9%BB%84.html">黄</a>の<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>。</p>
<p><a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>1なので<a href="%E3%82%A4%E3%82%A8%E3%83%AD%E3%83%BC%E3%82%AA%E3%83%BC%E3%83%96.html">イエローオーブ</a>と比べると<a href="%E9%AD%94%E5%8A%9B%E3%83%AC%E3%83%99%E3%83%AB.html">魔力レベル</a>の伸びは劣るが、<a href="%E5%BE%8C%E6%94%BB.html">後攻</a>1ターン目でも相手の初動イジンを除去できる。<a href="%E5%B1%B1%E6%9C%AD%E3%81%AE%E4%B8%8B.html">山札の下</a>に<a href="%E6%88%BB%E3%81%99.html">戻す</a>ので、<a href="%E5%8F%8D%E9%AD%82.html">反魂</a>を持つ<a href="%E5%BC%B5%E8%A7%92.html">張角</a>、<a href="%E8%97%A4%E5%8E%9F%E4%B8%8D%E6%AF%94%E7%AD%89.html">藤原不比等</a>、<a href="%E3%83%95%E3%83%AD%E3%83%BC%E3%83%AC%E3%83%B3%E3%82%B9%E3%83%BB%E3%83%8A%E3%82%A4%E3%83%81%E3%83%B3%E3%82%B2%E3%83%BC%E3%83%AB.html">フローレンス・ナイチンゲール</a>などにも有効である。</p>
<p>カード名は「花冠」。</p>
