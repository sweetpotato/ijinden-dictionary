<h1 class="title">尾形光琳</h1>
<div class="main">
<div id="content">
<blockquote>
<p>4-31</p>
<p>尾形光琳</p>
<p>イジン／黄／5</p>
<p>特性：美術</p>
<p>戦場に置かれたとき、自分の魔力ゾーンの裏のカードで、表がレベル4以下のハイケイのもの1つを指定して発動できる。そのカードを表向きで戦場に置いて、相手の戦場のイジン1体を山札の下に戻して、イジン召喚権+1する。</p>
<p>4500</p>
<p>遺業能力：1ドローする</p>
</blockquote>
<p><a href="%E9%99%A4%E5%8E%BB.html">除去</a>能力を持つ<a href="%E7%BE%8E%E8%A1%93.html">美術</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p>除去能力は<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>とシナジーしつつも<a href="%E5%9F%B7%E7%AD%86.html">執筆</a>ではないため、相手の<a href="%E3%82%B8%E3%83%A3%E3%83%B3%E3%83%BB%E3%82%AB%E3%83%AB%E3%83%B4%E3%82%A1%E3%83%B3.html">ジャン・カルヴァン</a>や<a href="%E5%A7%8B%E7%9A%87%E5%B8%9D.html">始皇帝</a>で執筆が妨害されていても使える。</p>
