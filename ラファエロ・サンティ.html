<h1 class="title">ラファエロ・サンティ</h1>
<div class="main">
<div id="content">
<blockquote>
<p>B-5</p>
<p>ラファエロ・サンティ</p>
<p>イジン／青／3</p>
<p>特性：美術</p>
<p>戦場に置かれたとき、自分の墓地のイジン1体かハイケイ1つを手札に戻す。</p>
<p>3000</p>
</blockquote>
<p><a href="%E5%A2%93%E5%9C%B0.html">墓地</a>のカードを回収できる<a href="%E7%BE%8E%E8%A1%93.html">美術</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p><a href="%E6%88%A6%E5%A0%B4.html">戦場</a>に置くのではなく<a href="%E6%89%8B%E6%9C%AD.html">手札</a>に<a href="%E6%88%BB%E3%81%99.html">戻す</a>ため、戻したカードを戦場に置くためにはその<a href="%E3%82%AB%E3%83%BC%E3%83%89%E3%82%92%E4%BD%BF%E3%81%86.html">カードを使う</a>必要がある。<a href="%E3%83%AC%E3%83%99%E3%83%AB%E6%9D%A1%E4%BB%B6.html">レベル条件</a>や<a href="%E8%89%B2%E6%9D%A1%E4%BB%B6.html">色条件</a>に注意したい。</p>
<p><a href="%E7%AC%AC4%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第4弾</a>環境では[[長屋ダヴィンチ]]に採用される。</p>
