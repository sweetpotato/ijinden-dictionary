<h1 class="title">カードを使う</h1>
<div class="main">
<div id="content">
<p>「カードを使う」とは、自分の<a href="%E3%83%A1%E3%82%A4%E3%83%B3%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">メインフェイズ</a>の間に<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF%E9%85%8D%E7%BD%AE.html">マリョク配置</a>する、<a href="%E3%82%A4%E3%82%B8%E3%83%B3%E5%8F%AC%E5%96%9A.html">イジン召喚</a>する、<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4%E4%BD%BF%E7%94%A8.html">ハイケイ使用</a>する、または<a href="%E3%83%9E%E3%83%9B%E3%82%A6%E4%BD%BF%E7%94%A8.html">マホウ使用</a>することをいう。</p>
<h2 id="解説">解説</h2>
<p>マリョク配置以外では、使う<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>は少なくとも<a href="%E8%89%B2%E6%9D%A1%E4%BB%B6.html">色条件</a>と<a href="%E3%83%AC%E3%83%99%E3%83%AB%E6%9D%A1%E4%BB%B6.html">レベル条件</a>を満たしている必要がある。</p>
<p>[[和宮]]は特定の条件のカードを使うことを禁止する<a href="%E8%83%BD%E5%8A%9B.html">能力</a>を持つ。</p>
