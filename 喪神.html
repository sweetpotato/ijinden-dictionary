<h1 class="title">喪神</h1>
<div class="main">
<div id="content">
<p>喪神（そうしん）は<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>のひとつであり、また<a href="%E3%82%AD%E3%83%BC%E3%83%AF%E3%83%BC%E3%83%89%E8%83%BD%E5%8A%9B.html">キーワード能力</a>のひとつである。喪神を持つカードが<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>から<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>に置かれたとき、<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>1体をアタッカーでない状態にすることができる。</p>
<h2 id="解説">解説</h2>
<p><a href="%E7%AC%AC4%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第4弾</a>で追加された防御系の能力である。同じ弾で追加された<a href="%E3%83%A2%E3%83%BC%E3%82%BF%E3%83%AB.html">モータル</a>を対策する能力としてデザインされたものと思われる。</p>
