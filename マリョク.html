<h1 class="title">マリョク</h1>
<div class="main">
<div id="content">
<p>マリョクは<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>の<a href="%E7%A8%AE%E9%A1%9E.html">種類</a>のひとつであり、<a href="%E9%AD%94%E5%8A%9B%E3%82%BE%E3%83%BC%E3%83%B3.html">魔力ゾーン</a>に置かれて、他の<a href="%E3%82%AB%E3%83%BC%E3%83%89%E3%82%92%E4%BD%BF%E3%81%86.html">カードを使う</a>ための<a href="%E3%83%AC%E3%83%99%E3%83%AB%E6%9D%A1%E4%BB%B6.html">レベル条件</a>や<a href="%E8%89%B2%E6%9D%A1%E4%BB%B6.html">色条件</a>を満たすカードである。通常、<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF%E9%85%8D%E7%BD%AE.html">マリョク配置</a>によって<a href="%E6%89%8B%E6%9C%AD.html">手札</a>から魔力ゾーンに置かれる。カードの種類を表す「マリョク」はカタカナ書きであることに注意されたい。</p>
<h2 id="概要">概要</h2>
<p>魔法使いという設定である<a href="%E3%83%97%E3%83%AC%E3%82%A4%E3%83%A4%E3%83%BC.html">プレイヤー</a>が<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>を召喚したり<a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>を使用したりするための力の源である。</p>
