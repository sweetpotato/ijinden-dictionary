<h1 class="title">司馬炎</h1>
<div class="main">
<div id="content">
<blockquote>
<p>3-38</p>
<p>司馬炎</p>
<p>イジン／黄／9</p>
<p>戦場に置かれたとき、自分の戦場のガーディアン1体につき、戦場のイジン1体を山札の下に戻す。</p>
<p>3000</p>
<p>遺業能力：反魂</p>
</blockquote>
<p><a href="%E9%99%A4%E5%8E%BB.html">除去</a>能力を持つイジン。</p>
<p><a href="%E5%8F%8D%E9%AD%82.html">反魂</a>を持ち、しかも<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>9なので、これが自分の<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>にいれば<a href="%E5%A7%9C%E7%B6%AD.html">姜維</a>をレベル0で召喚できる。これを狙って<a href="%E5%8F%8D%E9%AD%82%E3%83%93%E3%83%BC%E3%83%88%E3%83%80%E3%82%A6%E3%83%B3.html">反魂ビートダウン</a>に採用される。</p>
<p>除去能力は強制である。相手のイジンが足りなければこれを含む自分のイジンを<a href="%E5%B1%B1%E6%9C%AD%E3%81%AE%E4%B8%8B.html">山札の下</a>に<a href="%E6%88%BB%E3%81%99.html">戻す</a>必要がある。</p>
