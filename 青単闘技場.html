<h1 class="title">青単闘技場</h1>
<div class="main">
<div id="content">
<p>青単闘技場は<a href="%E5%86%86%E5%BD%A2%E9%97%98%E6%8A%80%E5%A0%B4.html">円形闘技場</a>を軸にしたビートダウンデッキ。<a href="%E7%AC%AC1%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第1弾</a>で成立した。</p>
<h2 id="解説">解説</h2>
<p>他の<a href="%E8%89%B2.html">色</a>を混ぜないぶん、色事故が起こりにくく、使いやすい。</p>
<p><a href="%E7%AC%AC3%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第3弾</a>で[[オブシディアン]]、<a href="%E7%AC%AC4%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第4弾</a>で[[カルドロン]]、<a href="%E7%AC%AC5%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第5弾</a>で<a href="%E3%83%94%E3%83%A9%E3%83%BC.html">ピラー</a>が追加されたことにより、最速で2ターン目に使用できるルートが強化されてきた。</p>
