<h1 class="title">ウィリアム・セシル</h1>
<div class="main">
<div id="content">
<blockquote>
<p>3-11</p>
<p>ウィリアム・セシル</p>
<p>イジン／赤／4</p>
<p>スタンド</p>
<p>戦場に置かれたとき、1ドローする。</p>
<p>1000</p>
<p>遺業能力：1ドローする</p>
</blockquote>
<p><a href="%E6%88%A6%E5%A0%B4.html">戦場</a>に置かれたときに1<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドロー</a>する<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。<a href="%E3%82%B9%E3%82%BF%E3%83%B3%E3%83%89.html">スタンド</a>も持つ。</p>
<p><a href="%E7%A5%9E%E5%89%A3%E7%9C%A0%E3%82%8B%E6%B0%8F%E7%A4%BE.html">神剣眠る氏社</a>とのシナジーは俗に「ウジリアム」と呼ばれる。セシルのスタンドで相手の<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>を<a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AF%E3%82%B9%E3%83%86%E3%83%83%E3%83%97.html">ブロック</a>しつつドローし、<a href="%E3%83%90%E3%83%88%E3%83%AB%E8%A7%A3%E6%B1%BA.html">バトル解決</a>で負けて<a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊された</a>セシルを氏社の能力で<a href="%E9%AD%94%E5%8A%9B%E3%82%BE%E3%83%BC%E3%83%B3.html">魔力ゾーン</a>に置けば、毎ターンのようにスタンドとドローを繰り返すことができる。</p>
