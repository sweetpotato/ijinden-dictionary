<blockquote>
<p>4-54</p>
<p>ドロレス</p>
<p>マホウ／青／1／魔力コスト1</p>
<p>相手の手札を見てレベル3以上のカード1つを墓地に置く。</p>
<p>遺業能力：冥府発動</p>
</blockquote>
<p>いわゆるピーピング<a href="%E3%83%8F%E3%83%B3%E3%83%87%E3%82%B9.html">ハンデス</a>ができる<a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>。</p>
<p>ライバルは<a href="%E3%83%A1%E3%82%A2%E3%83%AA%E3%83%BC1%E4%B8%96.html">メアリー1世</a>。あちらはマリョクを<a href="%E6%8D%A8%E3%81%A6%E3%82%8B.html">捨てさせる</a>ことはできないが、<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>に制約はない。こちらはマリョクであっても条件を満たすものは捨てさせられるが、レベル2以下のカードは捨てさせられない。また、こちらは<a href="%E5%86%A5%E5%BA%9C%E7%99%BA%E5%8B%95.html">冥府発動</a>を持つので、<a href="%E5%BC%B5%E8%A7%92.html">張角</a>で二重発動できる。</p>
