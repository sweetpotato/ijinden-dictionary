<h1 class="title">島津斉彬</h1>
<div class="main">
<div id="content">
<blockquote>
<p>4-11</p>
<p>島津斉彬</p>
<p>イジン／赤／4</p>
<p>これのイジン召喚に際し、これのレベルは、相手の戦場の起きているイジン1体につき1だけ下がる。</p>
<p>戦場に置かれたとき、イジン召喚権+1する。</p>
<p>3000</p>
<p>遺業能力：1ドローする</p>
</blockquote>
<p><a href="%E3%82%A4%E3%82%B8%E3%83%B3%E5%8F%AC%E5%96%9A%E6%A8%A9.html">イジン召喚権</a>を増やせるイジン。<a href="%E3%83%AC%E3%83%99%E3%83%AB%E8%BB%BD%E6%B8%9B.html">レベル軽減</a>能力も持つ。</p>
<p>典型的には2ターン目に召喚するイジンのため、レベル軽減能力は忘れられがちである。</p>
<p><a href="%E5%BE%B3%E5%B7%9D%E5%AE%B6%E5%BA%B7.html">徳川家康</a>と同じような使用感のイジンである。あちらは<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>3で<a href="%E5%89%A3%E8%A1%93.html">剣術</a>を持つが<a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>2000、こちらはレベル4で剣術を持たないがパワー3000である。</p>
