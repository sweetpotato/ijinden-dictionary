<h1 class="title">デュエル</h1>
<div class="main">
<div id="content">
<blockquote>
<p>4-55</p>
<p>デュエル</p>
<p>マホウ／緑／5／魔力コスト0</p>
<p>自分の戦場の起きているイジン1体と、相手の戦場のイジン1体を指定して発動できる。パワーが高い方のイジンを寝かせて、低い方のイジンを墓地に置く。同じならどちらも寝かせる。</p>
<p>遺業能力：魔力化</p>
</blockquote>
<p>自分と相手の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>を疑似的に<a href="%E3%83%90%E3%83%88%E3%83%AB.html">バトル</a>させる<a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>。</p>
<p><a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>が低い方のイジンは<a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊される</a>のではなく<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>に直接置かれるので、<a href="%E7%A0%B4%E5%A3%8A%E3%81%95%E3%82%8C%E3%81%AA%E3%81%84.html">破壊されない</a>イジンでも墓地に置くことになる。</p>
<p>カード名は「決闘」。</p>
