<div class="main">
<div id="content">
<blockquote>
<p>4-56</p>
<p>サーベイング</p>
<p>マホウ／緑／3／魔力コスト1</p>
<p>自分の手札のハイケイを1つ以上指定して発動できる。それらのハイケイすべてを墓地に置いて、墓地に置いたハイケイのレベルの合計5につき1ドローする。</p>
<p>遺業能力：魔力化</p>
</blockquote>
<p><a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>を<a href="%E6%8D%A8%E3%81%A6%E3%82%8B.html">捨てて</a><a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドローできる</a><a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>。</p>
<p><a href="%E5%A4%A7%E6%97%A5%E6%9C%AC%E6%B2%BF%E6%B5%B7%E8%BC%BF%E5%9C%B0%E5%85%A8%E5%9B%B3.html">大日本沿海輿地全図</a>を捨てれば1枚あたり3ドローになるが、1枚だけではサーベイング自身も含めたドロー効率はそれほど良くない。2枚以上を捨てつつ大量ドローし、さらに捨てたハイケイを<a href="%E4%BC%8A%E8%83%BD%E5%BF%A0%E6%95%AC.html">伊能忠敬</a>などで回収できるとおいしい。</p>
<p>カード名は「測量」。</p>
