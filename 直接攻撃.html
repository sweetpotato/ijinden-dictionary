<h1 class="title">直接攻撃</h1>
<div class="main">
<div id="content">
<p>直接攻撃とは、<a href="%E3%83%90%E3%83%88%E3%83%AB%E8%A7%A3%E6%B1%BA%E3%82%B9%E3%83%86%E3%83%83%E3%83%97.html">バトル解決ステップ</a>で選ばれた<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>を指定している<a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AB%E3%83%BC.html">ブロッカー</a>がいない状況で発生する、<a href="%E3%83%97%E3%83%AC%E3%82%A4%E3%83%A4%E3%83%BC.html">プレイヤー</a>に直接届く攻撃のことをいう。</p>
<h2 id="解説">解説</h2>
<p>直接攻撃を受けたプレイヤーは<a href="%E3%82%B2%E3%83%BC%E3%83%A0.html">ゲーム</a>に敗北する。ゲームにおいて双方のプレイヤーが目指す目標である。</p>
<p>遊戯王にならって、俗に「ダイレクトアタック」ともいう。</p>
