<h1 class="title">クララ・バートン</h1>
<div class="main">
<div id="content">
<blockquote>
<p>P-8</p>
<p>クララ・バートン</p>
<p>イジン／紫／3</p>
<p>特性：医術</p>
<p>戦場のカードが破壊されたとき、自分の魔力ゾーンのマリョク1つを裏にして、破壊されているカード1つを指定して発動できる。その破壊されているカードを手札に戻す。</p>
<p>3000</p>
</blockquote>
<p><a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊された</a>カードを<a href="%E6%89%8B%E6%9C%AD.html">手札</a>に<a href="%E6%88%BB%E3%81%99.html">戻せる</a><a href="%E5%8C%BB%E8%A1%93.html">医術</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。戻すカードはイジンに限らず、<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>でも<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>でも構わない。また、自分のカードでも相手のカードでも構わない。</p>
<p><a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>を<a href="%E8%A3%8F%E3%81%AB%E3%81%99%E3%82%8B.html">裏にできる</a>ので、[[遁甲マリョク]]とも相性が良い。</p>
