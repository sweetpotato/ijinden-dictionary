<h1 class="title">魔力コスト</h1>
<div class="main">
<div id="content">
<p>魔力コストは次の2つの意味を持つ：</p>
<ol class="list1">
<li><a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>が持つ<a href="%E5%BA%83%E7%BE%A9%E3%81%AE%E7%89%B9%E6%80%A7.html">広義の特性</a>のひとつであり、<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>の右上、<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>の左側に、円にナナメのギザギザが入ったマークの個数で記されている。そのようなマークが記されていないマホウの魔力コストは0である。マホウでないカードは魔力コストを持たない。</li>
<li><a href="%E3%83%9E%E3%83%9B%E3%82%A6%E4%BD%BF%E7%94%A8.html">マホウ使用</a>の魔力コスト条件を満たすために<a href="%E9%AD%94%E5%8A%9B%E3%82%BE%E3%83%BC%E3%83%B3.html">魔力ゾーン</a>から<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>に置いたカードを指す俗語である。</li>
</ol>
<h2 id="解説">解説</h2>
<p>マホウを使う際の対価の大きさを示す数値であり、レベルとは異なる概念である。例えば<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%82%A4%E3%83%B3%E3%82%B0.html">ドローイング</a>のレベルは3で、魔力コストは1である。</p>
