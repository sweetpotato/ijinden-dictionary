<p>色条件とは、<a href="%E3%82%AB%E3%83%BC%E3%83%89%E3%82%92%E4%BD%BF%E3%81%86.html">カードを使う</a>際に、その<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>の<a href="%E8%89%B2.html">色</a>について満たすべき条件である。使うカードと同じ色を持つ<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>1つ以上が自分の<a href="%E9%AD%94%E5%8A%9B%E3%82%BE%E3%83%BC%E3%83%B3.html">魔力ゾーン</a>にあるなら、そのカードは色条件を満たしている。</p>
