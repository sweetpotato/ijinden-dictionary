<h2 id="解説">解説</h2>
<p>各<a href="%E8%89%B2.html">色</a>に1つ存在する<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>1のマリョクである。いずれも<a href="%E9%AD%94%E5%8A%9B%E3%82%BE%E3%83%BC%E3%83%B3.html">魔力ゾーン</a>に置かれたときに1<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドローする</a>能力を持ち、また<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>は持たない。</p>
<p>マリョクのカードプールが狭い環境ではお世話になるだろう。</p>
