<h1 class="title">レベル</h1>
<div class="main">
<div id="content">
<p>レベルは<a href="%E5%BA%83%E7%BE%A9%E3%81%AE%E7%89%B9%E6%80%A7.html">広義の特性</a>のひとつであり、<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>なら左上に、そうでない<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>なら右上に、数字で記されている。</p>
<h2 id="解説">解説</h2>
<p>カードが「すぐに使えるかどうか」を示すと同時に「どれだけ強力か」の指標にもなる数値である。基本的に、レベルの小さいカードは<a href="%E3%82%B2%E3%83%BC%E3%83%A0.html">ゲーム</a>の序盤でも使うことができるがそれほど強くはなく、レベルの大きいカードは終盤にならないと使うことができないが強力である。</p>
