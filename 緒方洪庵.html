<blockquote>
<p>P-6</p>
<p>緒方洪庵</p>
<p>イジン／紫／3</p>
<p>特性：医術</p>
<p>能力によって手札から墓地にイジンが置かれるたび、そのカードのプレイヤーは1ドローする。</p>
<p>2500</p>
<p>遺業能力：木霊</p>
</blockquote>
<p>プレイヤーが<a href="%E6%89%8B%E6%9C%AD.html">手札</a>から<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>を捨てるたびに<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドローさせる</a><a href="%E5%8C%BB%E8%A1%93.html">医術</a>イジン。</p>
<p>[[徳川慶喜]]とはシナジーを形成し、相手がイジンでないカードを捨てるまでドローと<a href="%E3%83%8F%E3%83%B3%E3%83%87%E3%82%B9.html">ハンデス</a>を反復できる。これを狙ったデッキが[[医術ハンデス]]である。</p>
