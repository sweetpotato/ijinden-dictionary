<h1 class="title">ブロッカー</h1>
<div class="main">
<div id="content">
<p>ブロッカーとは相手の<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>を防御している<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>または<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>であり、<a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AF%E3%82%B9%E3%83%86%E3%83%83%E3%83%97.html">ブロックステップ</a>で非<a href="%E3%82%BF%E3%83%BC%E3%83%B3%E3%83%97%E3%83%AC%E3%82%A4%E3%83%A4%E3%83%BC.html">ターンプレイヤー</a>が選ぶ。</p>
<p>イジンがブロッカーである間、そのイジンの<a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AF%EF%BC%8B.html">ブロック＋</a>が有効になる。</p>
