<h1 class="title">黒船</h1>
<div class="main">
<div id="content">
<blockquote>
<p>3-60</p>
<p>黒船</p>
<p>ハイケイ／紫／6</p>
<p>戦場に置かれたとき、自分の手札1枚を墓地に置いて発動できる。相手の戦場のハイケイ1つを破壊する。</p>
<p>イジン召喚によって紫のイジンが自分の戦場に置かれる際、そのイジンに装備させてもよい。</p>
<p>装備 : 航海 - アタッカーになったとき、自分の戦場のガーディアン1体を手札に戻して、相手の戦場のガーディアン1体を手札に戻す。</p>
</blockquote>
<p><a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>を<a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊できる</a>ハイケイ。[[装備]]で自分と相手の<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>を<a href="%E6%89%8B%E6%9C%AD.html">手札</a>に<a href="%E6%88%BB%E3%81%99.html">戻す</a><a href="%E8%88%AA%E6%B5%B7.html">航海</a>も与えられる。</p>
