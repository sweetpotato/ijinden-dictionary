<p>孫夫人</p>
<p>イジン／黄／4</p>
<p>戦場に置かれたとき、自分の手札の「装備」を持つカード1つを見せて発動できる。イジン召喚権+1するか、このターンの間「即応」を得る。</p>
<p>これが戦場にいる間、装備しているイジンは、装備していないイジンにブロックされない。</p>
<p>1000</p>
<p>遺業能力：1ドローする</p>
</blockquote>
<p>[[装備]]に関する2つの能力を持つ<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
