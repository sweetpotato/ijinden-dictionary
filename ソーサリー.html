<p>ソーサリー</p>
<p>マホウ／緑／5／魔力コスト0</p>
<p>自分の山札の上から1枚を見て、自分の魔力ゾーンに裏向きのまま置く。そのカードがハイケイかマホウなら、魔力ゾーンに置くかわりに、相手に見せて自分の手札に加えてもよい。</p>
<p>遺業能力：冥府発動</p>
</blockquote>
<p><a href="%E8%A3%8F%E9%AD%94%E5%8A%9B.html">裏魔力</a>を補充できる<a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>。それが<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>かマホウなら<a href="%E6%89%8B%E6%9C%AD.html">手札</a>に加えられる。</p>
<p>カード名は「魔術」。</p>
