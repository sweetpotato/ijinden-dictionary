<h1 class="title">カード</h1>
<div class="main">
<div id="content">
<p>カードとは<a href="%E3%82%A4%E3%82%B8%E3%83%B3%E3%83%87%E3%83%B3.html">イジンデン</a>の<a href="%E3%82%B2%E3%83%BC%E3%83%A0.html">ゲーム</a>で使う、裏面にイジンデンのロゴが印刷された、所定の大きさと形状の厚紙である。</p>
<h2 id="解説">解説</h2>
<p><a href="%E3%82%B9%E3%82%BF%E3%83%BC%E3%82%BF%E3%83%BC%E3%82%BB%E3%83%83%E3%83%88.html">スターターセット</a>や<a href="%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">ブースターパック</a>といった商品を購入して入手する。個別の中古品カード（シングルカード）を扱っているカードショップも存在する。</p>
<p>カードはいくつかの情報を持つ。詳細は<a href="%E3%82%AB%E3%83%BC%E3%83%89%E3%81%8C%E6%8C%81%E3%81%A4%E6%83%85%E5%A0%B1.html">カードが持つ情報</a>の項目を参照されたい。</p>
<p>ほとんどすべてのカードは<a href="%E8%83%BD%E5%8A%9B.html">能力</a>を持つ。詳細は当該項目を参照されたい。</p>
