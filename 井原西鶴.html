<blockquote>
<p>3-30</p>
<p>井原西鶴</p>
<p>イジン／緑／2</p>
<p>執筆 - ハイケイか「美術」イジンが戦場に置かれたとき、これを寝かせて発動できる。自分の山札の上から1枚を裏のまま魔力ゾーンに置く。</p>
<p>1000</p>
</blockquote>
<p><a href="%E5%9F%B7%E7%AD%86.html">執筆</a>で<a href="%E8%A3%8F%E9%AD%94%E5%8A%9B.html">裏魔力</a>を補充できるイジン。</p>
<p>[[発動の手続]]で<a href="%E5%AF%9D%E3%81%8B%E3%81%9B%E3%82%8B.html">寝かせる</a>必要があるため、基本的にはターンに1回しか発動しない。しかし<a href="%E8%97%A4%E5%8E%9F%E5%AE%9A%E5%AE%B6.html">藤原定家</a>や<a href="%E6%AF%98%E7%9B%A7%E9%81%AE%E9%82%A3%E4%BB%8F%E5%83%8F.html">毘盧遮那仏像</a>といった自分のカードを起こすカードと一緒に使えば複数回発動できる可能性がある。</p>
