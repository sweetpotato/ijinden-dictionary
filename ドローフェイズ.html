<h1 class="title">ドローフェイズ</h1>
<div class="main">
<div id="content">
<blockquote>
<p><a href="%E3%82%BF%E3%83%BC%E3%83%B3.html">ターン</a> ＝ <a href="%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%88%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">スタートフェイズ</a> → <strong>ドローフェイズ</strong> → <a href="%E3%83%A1%E3%82%A4%E3%83%B3%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">メインフェイズ</a> → <a href="%E3%82%A8%E3%83%B3%E3%83%89%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">エンドフェイズ</a></p>
</blockquote>
<p>ドローフェイズはターンを構成するフェイズのひとつであり、<a href="%E3%82%BF%E3%83%BC%E3%83%B3%E3%83%97%E3%83%AC%E3%82%A4%E3%83%A4%E3%83%BC.html">ターンプレイヤー</a>は<a href="%E5%B1%B1%E6%9C%AD.html">山札</a>から<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>を1枚引いて<a href="%E6%89%8B%E6%9C%AD.html">手札</a>に加える。ただし、<a href="%E5%85%88%E6%94%BB.html">先攻</a>プレイヤーの最初のターンではこのフェイズを行わずにメインフェイズに進む。</p>
<h2 id="解説">解説</h2>
<p>手札を補充するフェイズである。</p>
<p><a href="%E3%82%A2%E3%82%A4%E3%82%B6%E3%83%83%E3%82%AF%E3%83%BB%E3%83%8B%E3%83%A5%E3%83%BC%E3%83%88%E3%83%B3.html">アイザック・ニュートン</a>はこのフェイズのルールを変更する能力を持つ。</p>
