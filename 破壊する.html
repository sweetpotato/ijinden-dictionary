<h1 class="title">破壊する</h1>
<div class="main">
<div id="content">
<p><a href="%E6%88%A6%E5%A0%B4.html">戦場</a>のカードを「破壊する」とは、<a href="%E7%A0%B4%E5%A3%8A%E3%81%95%E3%82%8C%E3%81%A6%E3%81%84%E3%81%AA%E3%81%84.html">破壊されていない</a>カードを<a href="%E7%A0%B4%E5%A3%8A%E3%81%95%E3%82%8C%E3%81%A6%E3%81%84%E3%82%8B.html">破壊されている</a>状態にすることをいう。破壊されているカードをさらに破壊することはできない。また、「<a href="%E7%A0%B4%E5%A3%8A%E3%81%95%E3%82%8C%E3%81%AA%E3%81%84.html">破壊されない</a>」カードも破壊できない。<a href="%E3%82%AD%E3%83%BC%E3%83%AF%E3%83%BC%E3%83%89%E5%87%A6%E7%90%86.html">キーワード処理</a>のひとつである。</p>
<p>同様に、戦場のカードが「破壊される」または「破壊された」とは、破壊されていないカードが破壊されている状態になったことをいう。</p>
