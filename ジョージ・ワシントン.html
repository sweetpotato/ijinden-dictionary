<p>ジョージ・ワシントン</p>
<p>イジン／赤／1</p>
<p>これが戦場にいる間、自分の戦場の『アタック+』能力を持つイジンは「即応」を得る。</p>
<p>500</p>
</blockquote>
<p><a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AF%EF%BC%8B.html">アタック＋</a>を持つ自分の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>に<a href="%E5%8D%B3%E5%BF%9C.html">即応</a>を与えるイジン。</p>
<p>アタック＋を持つイジンとは相性が良い。[[西郷隆盛]]と一緒に使うと面白いだろう。また、他のイジンにアタック＋を与える<a href="%E7%9B%B4%E6%B1%9F%E5%85%BC%E7%B6%9A.html">直江兼続</a>や<a href="%E8%B6%B3%E5%88%A9%E7%BE%A9%E6%BA%80.html">足利義満</a>とも相性が良い。</p>
