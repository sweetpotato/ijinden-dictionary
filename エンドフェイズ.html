<h1 class="title">エンドフェイズ</h1>
<div class="main">
<div id="content">
<blockquote>
<p><a href="%E3%82%BF%E3%83%BC%E3%83%B3.html">ターン</a> ＝ <a href="%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%88%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">スタートフェイズ</a> → <a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">ドローフェイズ</a> → <a href="%E3%83%A1%E3%82%A4%E3%83%B3%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">メインフェイズ</a> → <strong>エンドフェイズ</strong></p>
</blockquote>
<p>エンドフェイズはターンを構成するフェイズのひとつである。<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>の指示がない限り、エンドフェイズにおける<a href="%E3%83%97%E3%83%AC%E3%82%A4%E3%83%A4%E3%83%BC.html">プレイヤー</a>の行動はない。エンドフェイズが終了する際、<a href="%E3%82%BF%E3%83%BC%E3%83%B3%E3%83%97%E3%83%AC%E3%82%A4%E3%83%A4%E3%83%BC.html">ターンプレイヤー</a>が使用しなかった<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF%E9%85%8D%E7%BD%AE%E6%A8%A9.html">マリョク配置権</a>および<a href="%E3%82%A4%E3%82%B8%E3%83%B3%E5%8F%AC%E5%96%9A%E6%A8%A9.html">イジン召喚権</a>は消えて0になる。その後、相手のターンに移る。</p>
<h2 id="解説">解説</h2>
<p>ターンの後始末をするフェイズである。</p>
