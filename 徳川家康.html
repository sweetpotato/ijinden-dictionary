<blockquote>
<p>1-10</p>
<p>徳川家康</p>
<p>イジン／赤／3</p>
<p>特性：剣術</p>
<p>戦場に置かれたとき、イジン召喚権+1する。</p>
<p>2000</p>
<p>遺業能力：1ドローする</p>
</blockquote>
<p><a href="%E3%82%A4%E3%82%B8%E3%83%B3%E5%8F%AC%E5%96%9A%E6%A8%A9.html">イジン召喚権</a>を増やせる<a href="%E5%89%A3%E8%A1%93.html">剣術</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p>お手頃な<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>でイジンを横並べできる。<a href="%E6%AD%A6%E8%80%85%E3%81%AE%E8%94%B5.html">武者の蔵</a>と組み合わせれば、<a href="%E5%8D%B3%E5%BF%9C.html">即応</a>を与えて多勢で急襲することもできる。</p>
<p>その性能から、[[赤単アグロ]]や[[赤紫離宮]]などの<a href="%E8%B5%A4.html">赤</a>を含むビートダウンデッキに採用される。</p>
