<h1 class="title">カードが持つ情報</h1>
<div class="main">
<div id="content">
<p>カードが持つ情報には、<a href="%E5%BA%83%E7%BE%A9%E3%81%AE%E7%89%B9%E6%80%A7.html">広義の特性</a>と、そうでないものがある。</p>
<h2 id="広義の特性である情報">広義の特性である情報</h2>
<p><a href="%E5%BA%83%E7%BE%A9%E3%81%AE%E7%89%B9%E6%80%A7.html">広義の特性</a>を参照されたい。</p>
<h2 id="広義の特性でない情報">広義の特性でない情報</h2>
<p>広義の特性でない情報はゲーム上の意味を持たない。</p>
<h3 id="絵">絵</h3>
<p><a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>の絵はその上半分の中央に描かれており、ゲームの雰囲気作りを担っている。</p>
<h3 id="紹介文">紹介文</h3>
<p><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>を参照されたい。</p>
<h3 id="コレクター情報">コレクター情報</h3>
<p>カードのコレクター情報はその右側の内枠に記されている。コレクター情報には<a href="%E3%82%AB%E3%83%BC%E3%83%89%E7%95%AA%E5%8F%B7.html">カード番号</a>、<a href="%E3%83%AC%E3%82%A2%E3%83%AA%E3%83%86%E3%82%A3.html">レアリティ</a>、およびイラストレーター情報が含まれる。</p>
