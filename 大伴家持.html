<h1 class="title">大伴家持</h1>
<div class="main">
<div id="content">
<blockquote>
<p>1-40</p>
<p>大伴家持</p>
<p>イジン／緑／5</p>
<p>執筆 - ハイケイが戦場に置かれるたび、1ドローする。</p>
<p>自分の戦場のハイケイ1つにつき「パワー+1000」を得る。</p>
<p>3000</p>
</blockquote>
<p><a href="%E5%9F%B7%E7%AD%86.html">執筆</a>で<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドローし</a>、また<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>が増えるにつれて<a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>が強くなる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p>執筆系のデッキの<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%82%A8%E3%83%B3%E3%82%B8%E3%83%B3.html">ドローエンジン</a>として使用できる。第1弾では<a href="%E3%82%BF%E3%83%BC%E3%83%9C%E8%A1%8C%E5%9F%BA.html">ターボ行基</a>や<a href="%E6%B8%85%E5%B0%91%E7%B4%8D%E8%A8%80%E3%83%AD%E3%83%83%E3%82%AF.html">清少納言ロック</a>に採用される。</p>
<p>[[第2弾]]では1ターン目に召喚できる<a href="%E3%83%8F%E3%83%AA%E3%82%A8%E3%83%83%E3%83%88%E3%83%BB%E3%83%93%E3%83%BC%E3%83%81%E3%83%A3%E3%83%BC%E3%83%BB%E3%82%B9%E3%83%88%E3%82%A6.html">ハリエット・ビーチャー・ストウ</a>が登場し、執筆系のデッキのドローエンジンの座を譲ることになる。</p>
