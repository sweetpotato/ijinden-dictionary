<h1 class="title">大江広元</h1>
<div class="main">
<div id="content">
<blockquote>
<p>1-72</p>
<p>大江広元</p>
<p>イジン／赤／2</p>
<p>相手の戦場のイジンが破壊されるたび、1ドローする。</p>
<p>1000</p>
<p>遺業能力：1ドローする</p>
</blockquote>
<p>相手の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>が<a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊される</a>たびに<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドローする</a>イジン。</p>
<p><a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>2なので1ターン目に召喚でき、<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%82%A8%E3%83%B3%E3%82%B8%E3%83%B3.html">ドローエンジン</a>として活躍してくれる。<a href="%E5%8C%97%E6%9D%A1%E6%94%BF%E5%AD%90.html">北条政子</a>や<a href="%E3%83%90%E3%83%AC%E3%83%83%E3%83%88.html">バレット</a>などの破壊<a href="%E9%99%A4%E5%8E%BB.html">除去</a>と一緒に使いたい。</p>
<p>破壊されたカードが<a href="%E7%A0%B4%E5%A3%8A%E3%81%95%E3%82%8C%E3%81%A6%E3%81%84%E3%81%AA%E3%81%84.html">破壊されていない</a>状態になっても、破壊されたことに変わりはないのでドローする。</p>
