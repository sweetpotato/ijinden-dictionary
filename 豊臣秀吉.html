<div class="main">

<blockquote>
<p>2-8</p>
<p>豊臣秀吉</p>
<p>イジン／赤／10</p>
<p>これのイジン召喚に際し、これのレベルは、自分の戦場のイジンの最も高いレベルと同じだけ下がる。</p>
<p>即応</p>
<p>戦場に置かれたときに発動できる。追加でバトルする。</p>
<p>10000</p>
</blockquote>
<p>追加で<a href="%E3%83%90%E3%83%88%E3%83%AB.html">バトル</a>できる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。自身の<a href="%E3%83%AC%E3%83%99%E3%83%AB%E8%BB%BD%E6%B8%9B.html">レベルを軽減する</a>能力も持つ。</p>
<p><a href="%E3%83%95%E3%82%A1%E3%82%A4%E3%83%8A%E3%83%AB%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AF.html">ファイナルアタック</a>のように自分のイジンを<a href="%E8%B5%B7%E3%81%93%E3%81%99.html">起こす</a>ことはない。<a href="%E5%AE%89%E5%AE%85%E8%88%B9.html">安宅船</a>と一緒に使いたい。</p>
<p><a href="%E3%82%B8%E3%83%A7%E3%83%8A%E3%82%B5%E3%83%B3%E3%83%BB%E3%82%B8%E3%83%A7%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC.html">ジョナサン・ジョースター</a>に採用される。</p>
