<h1 class="title">ソリッドビジョン</h1>
<div class="main">
<div id="content">
<p>ソリッドビジョンとは次の<a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>の俗称である：</p>
<ul class="list1">
<li>[[ソリッドビジョンα]]（<a href="%E8%B5%A4%E9%AD%94%E5%B0%8E.html">赤魔導</a>）</li>
<li>[[ソリッドビジョンδ]]（<a href="%E9%9D%92%E9%AD%94%E5%B0%8E.html">青魔導</a>）</li>
<li>[[ソリッドビジョンΩ]]（<a href="%E7%B7%91%E9%AD%94%E5%B0%8E.html">緑魔導</a>）</li>
<li>[[ソリッドビジョンβ]]（<a href="%E9%BB%84%E9%AD%94%E5%B0%8E.html">黄魔導</a>）</li>
<li>[[ソリッドビジョンγ]]（<a href="%E7%B4%AB%E9%AD%94%E5%B0%8E.html">紫魔導</a>）</li>
</ul>
<h2 id="解説">解説</h2>
<p><a href="%E7%AC%AC3%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第3弾</a>に収録された、<a href="%E7%84%A1%E8%89%B2.html">無色</a>で<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>1のマホウであり、各<a href="%E8%89%B2.html">色</a>の<a href="%E9%AD%94%E5%B0%8E.html">魔導</a>を持つ。</p>
<p>各色個別の部分はギリシャ文字のアルファベットで統一されている。色との関係が<a href="%E7%A8%AE.html">種</a>以上になさそうに見えるので覚えにくい。</p>
