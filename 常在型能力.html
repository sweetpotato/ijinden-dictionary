<h1 class="title">常在型能力</h1>
<div class="main">
<div id="content">
<p>常在型能力（じょうざいがたのうりょく）とは、このサイトで使われる<strong>非公式</strong>のルール用語であり、<a href="%E7%99%BA%E5%8B%95%E5%9E%8B%E8%83%BD%E5%8A%9B.html">発動型能力</a>でない<a href="%E8%83%BD%E5%8A%9B.html">能力</a>をいう。</p>
<h2 id="解説">解説</h2>
<p><a href="%E3%83%AB%E3%83%BC%E3%83%AB%E3%83%86%E3%82%AD%E3%82%B9%E3%83%88.html">ルールテキスト</a>に「［何らかのきっかけが起きた］とき」とも「［何らかのきっかけが起きる］たび」とも書かれていない能力であり、常に発揮され続ける能力である。</p>
<p>いくつかの常在型能力は<a href="%E3%82%AD%E3%83%BC%E3%83%AF%E3%83%BC%E3%83%89%E8%83%BD%E5%8A%9B.html">キーワード能力</a>になっている。一覧は当該項目を参照されたい。</p>
