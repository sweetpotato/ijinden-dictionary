<h1 class="title">オーブ</h1>
<div class="main">
<div id="content">
<p>オーブとは次の<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>の俗称である：</p>
<ul class="list1">
<li><a href="%E3%83%AC%E3%83%83%E3%83%89%E3%82%AA%E3%83%BC%E3%83%96.html">レッドオーブ</a>（<a href="%E8%B5%A4.html">赤</a>）</li>
<li><a href="%E3%83%96%E3%83%AB%E3%83%BC%E3%82%AA%E3%83%BC%E3%83%96.html">ブルーオーブ</a>（<a href="%E9%9D%92.html">青</a>）</li>
<li><a href="%E3%82%B0%E3%83%AA%E3%83%BC%E3%83%B3%E3%82%AA%E3%83%BC%E3%83%96.html">グリーンオーブ</a>（<a href="%E7%B7%91.html">緑</a>）</li>
<li>[[イエローオーブ]]（<a href="%E9%BB%84.html">黄</a>）</li>
<li><a href="%E3%83%91%E3%83%BC%E3%83%97%E3%83%AB%E3%82%AA%E3%83%BC%E3%83%96.html">パープルオーブ</a>（<a href="%E7%B4%AB.html">紫</a>）</li>
</ul>
<h2 id="解説">解説</h2>
<p>各<a href="%E8%89%B2.html">色</a>に1つ存在する<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>2のマリョクであり、いずれも<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>として<a href="%E5%BE%A9%E5%85%83.html">復元</a>を持つ。基本的な<a href="%E3%80%8E%E3%82%B9%E3%83%88%E3%83%BC%E3%83%B3%E3%80%8F%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">『ストーン』マリョク</a>の[[上位互換]]である。</p>
<p>パープルオーブのみ<a href="%E3%82%B9%E3%82%BF%E3%83%BC%E3%82%BF%E3%83%BC%E3%82%BB%E3%83%83%E3%83%88.html">スターターセット</a>（<a href="%E7%99%BA%E5%B1%95%E3%81%99%E3%82%8B%E5%8C%BB%E5%AD%A6.html">発展する医学</a>）に収録されている。</p>
<p><a href="%E3%83%9E%E3%83%BC%E3%83%96%E3%83%AB%E3%82%AA%E3%83%BC%E3%83%96.html">マーブルオーブ</a>を含むこともある。</p>
