<blockquote>
<p>3-67</p>
<p>パシフィック</p>
<p>マホウ／黄／2／魔力コスト0</p>
<p>『プレッシャー』能力を持つイジン1体を指定して発動できる。そのイジンがアタッカーなら、そのイジンを山札の下に戻す。そうでなければ、そのイジンを寝かせる。</p>
<p>遺業能力：冥府発動</p>
</blockquote>
<p><a href="%E3%80%8E%E3%83%97%E3%83%AC%E3%83%83%E3%82%B7%E3%83%A3%E3%83%BC%E3%80%8F%E8%83%BD%E5%8A%9B.html">『プレッシャー』能力</a>を持つ<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>を<a href="%E9%99%A4%E5%8E%BB.html">除去</a>するか<a href="%E5%AF%9D%E3%81%8B%E3%81%9B%E3%82%8B.html">寝かせる</a><a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>。</p>
<p>『プレッシャー』能力に言及している珍しいカードでもある。</p>
<p>カード名は「平和な」「穏やかな」。</p>
