<h1 class="title">イジン</h1>
<div class="main">
<div id="content">
<p>イジンは<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>の<a href="%E7%A8%AE%E9%A1%9E.html">種類</a>のひとつであり、自分の<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>に置かれて相手の戦場の<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>やイジンと戦うカードである。通常、<a href="%E3%82%A4%E3%82%B8%E3%83%B3%E5%8F%AC%E5%96%9A.html">イジン召喚</a>によって<a href="%E6%89%8B%E6%9C%AD.html">手札</a>から戦場に置かれる。</p>
<h2 id="解説">解説</h2>
<p>イジンデンの主役となるカードである。</p>
<p>イジンは<a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>を持ち、これの大小を比べて戦いの勝ち負けを決める。詳細は<a href="%E3%83%90%E3%83%88%E3%83%AB%E8%A7%A3%E6%B1%BA.html">バトル解決</a>の項目を参照されたい。</p>
<p>ゲーム上の意味はないが、イジンのカードの下の方には紹介文がある。ここから偉人や歴史に興味を持つのもいいだろう。</p>
