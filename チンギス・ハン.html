<h1 class="title">チンギス・ハン</h1>
<div class="main">
<div id="content">
<blockquote>
<p>1-30</p>
<p>チンギス・ハン</p>
<p>イジン／青／5</p>
<p>ダブルプレッシャー</p>
<p>戦場に置かれたとき、魔力ゾーンの裏のカードすべてをガーディアンにして戦場に置く。</p>
<p>4000</p>
</blockquote>
<p><a href="%E8%A3%8F%E9%AD%94%E5%8A%9B.html">裏魔力</a>を<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>にできる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p><a href="%E5%86%86%E5%BD%A2%E9%97%98%E6%8A%80%E5%A0%B4.html">円形闘技場</a>と一緒に使えば<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>を一気に増やせる。このことから<a href="%E9%9D%92%E5%8D%98%E9%97%98%E6%8A%80%E5%A0%B4.html">青単闘技場</a>、<a href="%E8%B5%A4%E9%9D%92%E9%97%98%E6%8A%80%E5%A0%B4.html">赤青闘技場</a>、<a href="%E9%9D%92%E7%B7%91%E9%97%98%E6%8A%80%E5%A0%B4.html">青緑闘技場</a>などに採用される。ただし、相手の裏魔力もガーディアンになることには注意したい。</p>
<p><a href="%E5%86%A5%E5%BA%9C%E7%99%BA%E5%8B%95.html">冥府発動</a>を持つ<a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>を裏魔力からガーディアンに仕込むのにも使える。</p>
