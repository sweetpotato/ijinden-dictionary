<h1 class="title">純白の塔</h1>
<div class="main">
<div id="content">
<blockquote>
<p>1-47</p>
<p>純白の塔</p>
<p>ハイケイ／青／4</p>
<p>自分が3体以上でアタックしたとき、アタッカー1体を指定して発動できる。そのアタッカーは、このターンの間「イジンにブロックされない」を得る。</p>
<p>遺業能力：手札に戻す</p>
</blockquote>
<p>自分の<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>1体を<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>にブロックされなくする<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>。ただし3体以上でアタックする必要がある。</p>
<p>相手の<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>が残っているうちは、イジンにブロックされないアタッカーをガーディアンでブロックされてしまう。真価を発揮できるのは、相手のガーディアンがいない状況になるか。</p>
