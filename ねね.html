<p>ねね</p>
<p>イジン／赤／2</p>
<p>自分のメインフェイズが開始したとき、自分の手札のレベル5以下の赤のイジン1体を指定して発動できる。そのイジンを戦場に置いて、これを手札に戻す。</p>
<p>500</p>
<p>遺業能力：反魂</p>
</blockquote>
<p><a href="%E6%89%8B%E6%9C%AD.html">手札</a>の<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>5以下の<a href="%E8%B5%A4.html">赤</a>の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>と交代できるイジン。</p>
<p>[[熒惑テンポ]]では初動イジンとして採用され、状況に応じて<a href="%E7%B9%94%E7%94%B0%E4%BF%A1%E9%95%B7.html">織田信長</a>、<a href="%E3%83%AA%E3%83%81%E3%83%A3%E3%83%BC%E3%83%89%E3%83%BB%E3%82%A2%E3%83%BC%E3%82%AF%E3%83%A9%E3%82%A4%E3%83%88.html">リチャード・アークライト</a>、<a href="%E3%82%B8%E3%83%A7%E3%83%BC%E3%82%B8%E3%83%BB%E3%82%B9%E3%83%81%E3%83%BC%E3%83%96%E3%83%B3%E3%82%BD%E3%83%B3.html">ジョージ・スチーブンソン</a>、<a href="%E3%82%A8%E3%83%AA%E3%82%B6%E3%83%99%E3%82%B91%E4%B8%96.html">エリザベス1世</a>などと交代される。</p>
