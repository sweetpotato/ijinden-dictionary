<h1 class="title">天下分け目の主戦場</h1>
<div class="main">
<div id="content">
<blockquote>
<p>3-52</p>
<p>天下分け目の主戦場</p>
<p>ハイケイ／赤／1</p>
<p>これが戦場にある間、自分の魔力ゾーンのマリョクは「戦場の能力によって魔力ゾーンを離れない」を得る。</p>
<p>カードが魔力ゾーンに5つ以上ある間、自分の戦場のイジンは「アタック+2000」を得る。</p>
</blockquote>
<p>2つの能力を持つ<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>。</p>
<p>1つ目の能力は<a href="%E6%B8%85%E5%B0%91%E7%B4%8D%E8%A8%80.html">清少納言</a>への対策として機能する。</p>
<p>2つ目の能力は<a href="%E3%82%B8%E3%83%A7%E3%83%BC%E3%82%B8%E3%83%BB%E3%83%AF%E3%82%B7%E3%83%B3%E3%83%88%E3%83%B3.html">ジョージ・ワシントン</a>と相性が良い。枚数は自分と相手の<a href="%E9%AD%94%E5%8A%9B%E3%82%BE%E3%83%BC%E3%83%B3.html">魔力ゾーン</a>をあわせて数える。<a href="%E7%A8%AE.html">種</a>を使うなどして枚数を速やかに増やしたい。</p>
