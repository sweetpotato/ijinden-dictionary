<h1 class="title">徳川慶喜</h1>
<div class="main">
<div id="content">
<blockquote>
<p>3-47</p>
<p>徳川慶喜</p>
<p>イジン／紫／1</p>
<p>戦場の能力によって相手がドローしたとき、相手の手札のカード1つを墓地に置く。そのカードは相手が選ぶ。</p>
<p>1000</p>
</blockquote>
<p>相手の<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドロー</a>を邪魔できる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p><a href="%E3%83%8F%E3%83%AA%E3%82%A8%E3%83%83%E3%83%88%E3%83%BB%E3%83%93%E3%83%BC%E3%83%81%E3%83%A3%E3%83%BC%E3%83%BB%E3%82%B9%E3%83%88%E3%82%A6.html">ハリエット・ビーチャー・ストウ</a>の天敵である。<a href="%E3%83%AB%E3%83%BC%E3%83%8A.html">ルーナ</a>などで除去するか<a href="%E6%96%B0%E5%B3%B6%E5%85%AB%E9%87%8D.html">新島八重</a>で対策したい。</p>
<p><a href="%E7%B7%92%E6%96%B9%E6%B4%AA%E5%BA%B5.html">緒方洪庵</a>と一緒に使えば、相手がイジンでないカードを捨てるまでドローと<a href="%E3%83%8F%E3%83%B3%E3%83%87%E3%82%B9.html">ハンデス</a>を反復できる。これを狙ったデッキが<a href="%E5%8C%BB%E8%A1%93%E3%83%8F%E3%83%B3%E3%83%87%E3%82%B9.html">医術ハンデス</a>である。</p>
