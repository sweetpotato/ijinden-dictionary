<p>2-14</p>
<p>北条時政</p>
<p>イジン／赤／5</p>
<p>特性：剣術</p>
<p>アタッカーになったとき、自分の戦場のイジンとガーディアンをすきなだけ寝かせて発動できる。このターンの間、寝かせた1体につき「アタック+2000」を得る。</p>
<p>パワー5000以上の間「ダブルプレッシャー」を得る。</p>
<p>1000</p>
<p>遺業能力：1ドローする</p>
</blockquote>
<p>自分の防御を薄くする代わりに<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>性能を上げることができ、条件付きで<a href="%E3%83%80%E3%83%96%E3%83%AB%E3%83%97%E3%83%AC%E3%83%83%E3%82%B7%E3%83%A3%E3%83%BC.html">ダブルプレッシャー</a>も得られる<a href="%E5%89%A3%E8%A1%93.html">剣術</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
