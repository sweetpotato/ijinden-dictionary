<blockquote>
<p>1-46</p>
<p>武者の蔵</p>
<p>ハイケイ／赤／4</p>
<p>これが戦場にある間、自分の戦場のレベル2以下のイジンは「特性：剣術」を得る。</p>
<p>これが戦場にある間、自分の戦場の「剣術」イジンは「即応」を得る。</p>
<p>遺業能力：魔力化</p>
</blockquote>
<p>自分の<a href="%E5%89%A3%E8%A1%93.html">剣術</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>に<a href="%E5%8D%B3%E5%BF%9C.html">即応</a>を与える<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>。さらに自身の能力により、自分の<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>2以下のイジンにも即応を与えられる。</p>
<p>剣術イジンとは相性が良く、[[赤単アグロ]]に採用できる。</p>
