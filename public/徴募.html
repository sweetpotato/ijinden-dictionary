<h1 class="title">徴募</h1>
<div class="main">
<div id="content">
<p>徴募（ちょうぼ）は<a href="%E8%83%BD%E5%8A%9B%E8%AA%9E.html">能力語</a>のひとつである。</p>
<h2 id="解説">解説</h2>
<p>典型的には「自分の<a href="%E3%82%A8%E3%83%B3%E3%83%89%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">エンドフェイズ</a>が開始したとき、この<a href="%E3%82%BF%E3%83%BC%E3%83%B3.html">ターン</a>に<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>が<a href="%E7%A0%B4%E5%A3%8A%E3%81%95%E3%82%8C%E3%81%A6%E3%81%84%E3%82%8B.html">破壊されている</a>なら」発動する。また、<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>だけでなく<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>でも発動する。</p>
<p><a href="%E5%A2%93%E5%9C%B0%E5%88%A9%E7%94%A8.html">墓地利用</a>のひとつの形である。</p>
<p>徴募を軸にしたデッキには<a href="%E9%9D%92%E9%BB%84%E5%BE%B4%E5%8B%9F.html">青黄徴募</a>や[[青紫徴募]]がある。</p>
</div>
