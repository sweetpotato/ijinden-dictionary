<h1 class="title">ドローする</h1>
<div class="main">
<div id="content">
<p>「ドローする」は<a href="%E3%82%AD%E3%83%BC%E3%83%AF%E3%83%BC%E3%83%89%E5%87%A6%E7%90%86.html">キーワード処理</a>のひとつである。「［プレイヤーは］［N］ドローする」（Nは正の整数）とは、その<a href="%E3%83%97%E3%83%AC%E3%82%A4%E3%83%A4%E3%83%BC.html">プレイヤー</a>が<a href="%E5%B1%B1%E6%9C%AD.html">山札</a>からカードN枚を引いて<a href="%E6%89%8B%E6%9C%AD.html">手札</a>に加えることをいう。プレイヤーが明記されていない場合、その効果のプレイヤーが引く。</p>
<h2 id="解説">解説</h2>
<p>トレーディングカードゲームにおける最も基本的な行動のひとつである。基本的に、カードをたくさんドローして手札が増えるほど、選択肢が増えて有利になる。</p>
