<h1 class="title">封印構築</h1>
<div class="main">
<div id="content">
<p>封印構築は<a href="%E3%82%AA%E3%83%97%E3%82%B7%E3%83%A7%E3%83%B3%E3%83%AB%E3%83%BC%E3%83%AB.html">オプションルール</a>のひとつである。採用する場合、特定の<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>の上限枚数を4枚から減らして（0枚も可能）<a href="%E3%83%87%E3%83%83%E3%82%AD.html">デッキ</a>や<a href="%E3%82%B5%E3%82%A4%E3%83%89%E3%83%87%E3%83%83%E3%82%AD.html">サイドデッキ</a>を作る。具体的なカードと上限枚数はコミュニティごとに決定する。</p>
<h2 id="解説">解説</h2>
<p>強すぎて誰もが使いがちになったカードを禁止・制限したり、普段とは違うカードプールでゲームを楽しんだりするためのルールである。</p>
