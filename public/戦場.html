<h1 class="title">戦場</h1>
<div class="main">
<div id="content">
<p>戦場は<a href="%E5%A0%B4%E6%89%80.html">場所</a>のひとつであり、<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>や<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>など、主に<a href="%E3%83%90%E3%83%88%E3%83%AB.html">バトル</a>で使う<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>を置くところである。戦場は公開場所である。ただし、<a href="%E8%A3%8F%E5%90%91%E3%81%8D.html">裏向き</a>のカード（<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>）の表面はどの<a href="%E3%83%97%E3%83%AC%E3%82%A4%E3%83%A4%E3%83%BC.html">プレイヤー</a>も見ることができない。</p>
<h2 id="解説">解説</h2>
<p>まさにイジンを戦わせる場所である。</p>
<p>[[装備]]されたカードでない限り、<a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>や<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>が<a href="%E8%A1%A8%E5%90%91%E3%81%8D.html">表向き</a>で戦場に置かれることはない。ただし裏向きで（ガーディアンとして）置かれることはある。マホウやマリョクの<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>は、典型的には、表面がマホウやマリョクであるようなガーディアンが<a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊されて</a>墓地に置かれたときに発動する。</p>
