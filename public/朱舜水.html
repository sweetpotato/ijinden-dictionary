<p>自分のカードが<a href="%E5%AF%9D%E3%81%8B%E3%81%9B%E3%82%8B.html">寝たり</a><a href="%E8%B5%B7%E3%81%93%E3%81%99.html">起きたり</a>したときに発動する能力を持つ<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
