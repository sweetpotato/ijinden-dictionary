<h1 class="title">黄</h1>
<div class="main">
<div id="content">
<p>黄は<a href="%E3%82%A4%E3%82%B8%E3%83%B3%E3%83%87%E3%83%B3.html">イジンデン</a>における<a href="%E8%89%B2.html">色</a>のひとつである。</p>
<h2 id="解説">解説</h2>
<p><a href="%E7%AC%AC2%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第2弾</a>で追加された色である。この色の<a href="%E3%82%B9%E3%82%BF%E3%83%BC%E3%82%BF%E3%83%BC%E3%82%BB%E3%83%83%E3%83%88.html">スターターセット</a>は<a href="%E4%B8%89%E5%9B%BD%E3%81%AE%E8%8B%B1%E5%82%91.html">三国の英傑</a>デッキである。</p>
<p><a href="%E3%83%9E%E3%83%BC%E3%83%96%E3%83%AB%E3%82%AA%E3%83%BC%E3%83%96.html">マーブルオーブ</a>や<a href="%E3%83%9E%E3%83%BC%E3%83%96%E3%83%AB%E3%82%B9%E3%83%88%E3%83%BC%E3%83%B3.html">マーブルストーン</a>といった<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>があり、<a href="%E8%B5%A4.html">赤</a>、<a href="%E9%9D%92.html">青</a>、または<a href="%E7%B7%91.html">緑</a>と組み合わせて使いやすいようにデザインされている。</p>
<p><a href="%E3%82%B5%E3%83%B3%E3%83%89%E3%82%B0%E3%83%A9%E3%82%B9.html">サンドグラス</a>、[[ジオオーラ]]、[[鎮星のピラー]]など、土のイメージを持つ。</p>
