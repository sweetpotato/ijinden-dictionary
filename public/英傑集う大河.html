<h1 class="title">英傑集う大河</h1>
<div class="main">
<div id="content">
<p>自分の<a href="%E9%BB%84.html">黄</a>の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>に3<a href="%E8%89%B2.html">色</a>を与える<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>。防御能力も持つ。</p>
<p>自身の能力で<a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊でき</a>、さらに<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>で<a href="%E5%B1%B1%E6%9C%AD%E3%81%AE%E4%B8%8B.html">山札の下</a>に戻せるので、同じ<a href="%E4%B8%89%E5%9B%BD%E3%81%AE%E8%8B%B1%E5%82%91.html">三国の英傑</a>の<a href="%E8%AB%B8%E8%91%9B%E4%BA%AE.html">諸葛亮</a>とは相性がいい。</p>
<p>自分の戦場にイジンがいる間、自分の戦場の色を水増しできるハイケイでもある。<a href="%E3%82%B9%E3%82%AB%E3%83%BC%E3%83%AC%E3%83%83%E3%83%88.html">スカーレット</a>、<a href="%E3%83%94%E3%83%BC%E3%82%B3%E3%83%83%E3%82%AF.html">ピーコック</a>、<a href="%E3%82%B7%E3%83%A3%E3%83%88%E3%83%AB%E3%83%BC%E3%82%BA.html">シャトルーズ</a>とは相性がいい。ただしこの目的では、単体で水増しができる<a href="%E4%B8%89%E5%B1%A4%E3%81%AE%E8%88%8E%E5%88%A9%E6%AE%BF.html">三層の舎利殿</a>の方が使いやすいだろう。</p>
<p><a href="%E7%BE%A9%E6%94%BF%E5%A4%A7%E6%B2%B3.html">義政大河</a>のコンボパーツである。</p>
