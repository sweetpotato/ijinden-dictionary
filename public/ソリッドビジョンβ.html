<p><a href="%E9%BB%84%E9%AD%94%E5%B0%8E.html">黄魔導</a>で<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>のカードを<a href="%E5%B1%B1%E6%9C%AD.html">山札</a>に<a href="%E6%88%BB%E3%81%99.html">戻せる</a><a href="%E3%82%BD%E3%83%AA%E3%83%83%E3%83%89%E3%83%93%E3%82%B8%E3%83%A7%E3%83%B3.html">ソリッドビジョン</a>。</p>
