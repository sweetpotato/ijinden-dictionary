<h1 class="title">フール</h1>
<div class="main">
<div id="content">
<p>条件付きで<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドロー</a>できる<a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>。ドローできるか否かは自分の<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>のマホウの合計レベルに依存する。</p>
<p>典型的には、これのみを<a href="%E3%83%9E%E3%83%9B%E3%82%A6%E4%BD%BF%E7%94%A8.html">マホウ使用</a>している間はドローできる。そのため、ゲーム序盤のドロー加速や、いわゆるデッキ圧縮のために採用される。</p>
<p>カード名は「愚か者」。元ネタはタロットカードの愚者（The Fool）か。</p>
