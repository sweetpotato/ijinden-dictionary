<h1 class="title">ディ・クローネ</h1>
<div class="main">
<div id="content">
<p><a href="%E9%99%A4%E5%8E%BB.html">除去</a>能力付きの<a href="%E7%B4%AB.html">紫</a>の<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>。</p>
<p><a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>1なので<a href="%E3%83%91%E3%83%BC%E3%83%97%E3%83%AB%E3%82%AA%E3%83%BC%E3%83%96.html">パープルオーブ</a>と比べると<a href="%E9%AD%94%E5%8A%9B%E3%83%AC%E3%83%99%E3%83%AB.html">魔力レベル</a>の伸びは劣るが、後攻1ターン目でも相手の初動イジンのいくらかを除去できる。<a href="%E3%83%8F%E3%83%AA%E3%82%A8%E3%83%83%E3%83%88%E3%83%BB%E3%83%93%E3%83%BC%E3%83%81%E3%83%A3%E3%83%BC%E3%83%BB%E3%82%B9%E3%83%88%E3%82%A6.html">ハリエット・ビーチャー・ストウ</a>や<a href="%E3%82%B8%E3%83%A7%E3%83%90%E3%83%B3%E3%83%8B%EF%BC%9D%E3%83%87%E3%82%A3%EF%BC%9D%E3%83%A1%E3%83%87%E3%82%A3%E3%83%81.html">ジョバンニ＝ディ＝メディチ</a>などが候補に挙がるか。また、<a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>1000以下ならレベルは問わず、<a href="%E5%B1%B1%E6%9C%AD%E3%81%AE%E4%B8%8B.html">山札の下</a>に<a href="%E6%88%BB%E3%81%99.html">戻す</a>ので、<a href="%E7%A0%B4%E5%A3%8A%E8%80%90%E6%80%A7.html">破壊耐性</a>を持つ<a href="%E3%82%A2%E3%83%AA%E3%82%A8%E3%83%8E%E3%83%BC%E3%83%AB%E3%83%BB%E3%83%80%E3%82%AD%E3%83%86%E3%83%BC%E3%83%8C.html">アリエノール・ダキテーヌ</a>にも有効である。</p>
<p>カード名は「王冠」。</p>
