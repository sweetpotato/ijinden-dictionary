<h1 class="title">間宮林蔵</h1>
<div class="main">
<div id="content">
<p><a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>や<a href="%E8%A3%8F%E9%AD%94%E5%8A%9B.html">裏魔力</a>を[[バウンス]]できるイジン。</p>
<p>ガーディアンのみをバウンスする<a href="%E3%82%A8%E3%82%A4%E3%83%96%E3%83%A9%E3%83%8F%E3%83%A0%E3%83%BB%E3%83%AA%E3%83%B3%E3%82%AB%E3%83%B3.html">エイブラハム・リンカン</a>とは異なり、<a href="%E9%81%81%E7%94%B2%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">遁甲マリョク</a>の疑いがある相手の裏魔力にも対応できる。</p>
<p><a href="%E4%B8%89%E5%B1%A4%E3%81%AE%E8%88%8E%E5%88%A9%E6%AE%BF.html">三層の舎利殿</a>とは相性が良い。参照するのは<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>の<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>の色のみだが、自分と相手の両方の戦場を参照するので、相手の戦場に舎利殿があると友情コンボになる。</p>
