<h1 class="title">坂上田村麻呂</h1>
<div class="main">
<div id="content">
<p>シンプルな<a href="%E5%89%A3%E8%A1%93.html">剣術</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。<a href="%E6%96%B0%E6%97%A7.html">新旧</a>とも同じ<a href="%E3%83%AB%E3%83%BC%E3%83%AB%E3%83%86%E3%82%AD%E3%82%B9%E3%83%88.html">ルールテキスト</a>、同じ性能である。</p>
<p><a href="%E3%83%80%E3%83%96%E3%83%AB%E3%83%97%E3%83%AC%E3%83%83%E3%82%B7%E3%83%A3%E3%83%BC.html">ダブルプレッシャー</a>を持っているが、<a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>は1000と低いので、そのままでは圧力をかけづらい。<a href="%E9%80%A3%E3%81%AA%E3%82%8B%E5%A4%A9%E5%AE%88%E9%96%A3.html">連なる天守閣</a>などでパワーを上げて使いたい。</p>
<p>ライバルは同じ<a href="%E8%B5%A4.html">赤</a>で<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>4の<a href="%E7%B9%94%E7%94%B0%E4%BF%A1%E9%95%B7.html">織田信長</a>。あちらは<a href="%E3%82%A8%E3%83%B3%E3%83%89%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">エンドフェイズ</a>が開始したときに<a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊される</a>デメリットを持っているが、<a href="%E7%AC%AC5%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第5弾</a>以降は<a href="%E3%83%94%E3%83%A9%E3%83%BC.html">ピラー</a>でそれも克服できるようになった。</p>
