<div class="main">
<div id="content">
<p>1体で2体の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>を<a href="%E9%99%A4%E5%8E%BB.html">除去</a>できるイジン。</p>
<p>除去能力は[[発動の手続]]として相手の<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>の<a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>6000以下のイジン1体を指定する必要がある。そのため、そのようなイジンがいない場合、そのようなイジンを破壊できないのはもちろん、「相手の戦場の起きているイジン1体」も破壊できない。</p>
