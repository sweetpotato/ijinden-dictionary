<p>相手の<a href="%E9%AD%94%E5%8A%9B%E3%82%BE%E3%83%BC%E3%83%B3.html">魔力ゾーン</a>のカードの数が自分のそれ以上なら、<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>を追加で置けるマリョク。</p>
<p>魔力ゾーンのカードを数える際はこれ自身も数える。</p>
<p>これ能力によってマリョクが置かれることによっては、典型的は決起は発動しないことに気をつけたい。また、墓地のマリョクを置けることも忘れがちなので気をつけたい。</p>
