<h1 class="title">メアリー1世</h1>
<div class="main">
<div id="content">
<p>いわゆるピーピング<a href="%E3%83%8F%E3%83%B3%E3%83%87%E3%82%B9.html">ハンデス</a>ができる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。相手の<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>を除いた一番強い<a href="%E6%89%8B%E6%9C%AD.html">手札</a>を<a href="%E6%8D%A8%E3%81%A6%E3%82%8B.html">捨てさせられる</a>のが強力である。</p>
<p><a href="%E9%9D%92%E9%BB%84%E5%BE%B4%E5%8B%9F.html">青黄徴募</a>では<a href="%E3%83%94%E3%83%A7%E3%83%BC%E3%83%88%E3%83%AB%E5%A4%A7%E5%B8%9D.html">ピョートル大帝</a>でこれを使い回すことで相手の<a href="%E6%89%8B%E6%9C%AD.html">手札</a>をコントロールする。また<a href="%E9%9D%92.html">青</a>なので、<a href="%E6%9B%B9%E6%93%8D.html">曹操</a>がいる状況で<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>にすれば曹操の能力で破壊でき、<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドロー</a>を進めつつ<a href="%E5%BE%B4%E5%8B%9F.html">徴募</a>も達成できる。</p>
