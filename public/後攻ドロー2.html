<div class="main">
<div id="content">
<p>後攻ドロー2は<a href="%E3%82%AA%E3%83%97%E3%82%B7%E3%83%A7%E3%83%B3%E3%83%AB%E3%83%BC%E3%83%AB.html">オプションルール</a>のひとつである。採用する場合、<a href="%E5%BE%8C%E6%94%BB.html">後攻</a>の最初の<a href="%E3%82%BF%E3%83%BC%E3%83%B3.html">ターン</a>の<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">ドローフェイズ</a>では、<a href="%E5%B1%B1%E6%9C%AD.html">山札</a>から<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>を1枚引く代わりに2枚引く。「後攻2ドロー」（2の位置に注意）ともいう。</p>
<h2 id="解説">解説</h2>
<p><a href="%E5%85%88%E6%94%BB.html">先攻</a>と後攻の有利・不利を補正するためのルールである。</p>
