<h1 class="title">マルクス・アントニウス</h1>
<div class="main">
<div id="content">
<p><a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>を<a href="%E8%A3%8F%E9%AD%94%E5%8A%9B.html">裏魔力</a>にして<a href="%E3%82%A4%E3%82%B8%E3%83%B3%E5%8F%AC%E5%96%9A%E6%A8%A9.html">イジン召喚権</a>を増やせる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p>横並べをしたり、<a href="%E9%AD%94%E5%8A%9B%E3%83%AC%E3%83%99%E3%83%AB.html">魔力レベル</a>を伸ばしたり、[[盾落ち]]したコンボパーツを<a href="%E9%AD%94%E5%8A%9B%E3%82%B3%E3%82%B9%E3%83%88.html">魔力コスト</a>に充ててから他のカードで墓地回収したりと、1枚でいろんな役割をこなせる。ただし、バトル性能は絵の見た目ほどは高くない。</p>
<p>[[リユニオンLO]]では召喚権の回復やコンボパーツの回収に使われることがある。</p>
