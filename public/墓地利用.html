<h1 class="title">墓地利用</h1>
<div class="main">
<div id="content">
<p>墓地利用とは、<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>の<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>を有効に利用することをいう俗語である。</p>
<h2 id="解説">解説</h2>
<p>墓地で有益な能力を発揮するカードや、墓地を参照して強化されるカード、あるいは墓地から<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>、<a href="%E6%89%8B%E6%9C%AD.html">手札</a>、または<a href="%E9%AD%94%E5%8A%9B%E3%82%BE%E3%83%BC%E3%83%B3.html">魔力ゾーン</a>にカードを<a href="%E6%88%BB%E3%81%99.html">戻す</a>カードがいくつも存在する。何らかの方法で墓地の枚数を積極的に増やすことができれば、このようなカードを強く使うことができる。このことから、墓地は「第2の手札」と呼ばれることがある。</p>
<p><a href="%E3%83%AA%E3%82%A2%E3%83%8B%E3%83%A1%E3%82%A4%E3%83%88.html">リアニメイト</a>、<a href="%E5%A2%93%E5%9C%B0%E8%82%A5%E3%82%84%E3%81%97.html">墓地肥やし</a>、<a href="%E5%A2%93%E5%9C%B0%E5%AF%BE%E7%AD%96.html">墓地対策</a>の項目も参照されたい。</p>
