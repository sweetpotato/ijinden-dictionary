<h1 class="title">マザーグース</h1>
<div class="main">
<div id="content">
<p><a href="%E5%9F%B7%E7%AD%86.html">執筆</a>で<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドロー</a>できる<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>。<a href="%E5%86%A5%E8%A3%85.html">冥装</a>させれば<a href="%E9%9F%B3%E6%A5%BD.html">音楽</a>を与えられる。</p>
<p><a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>の<a href="%E5%96%AA%E7%A5%9E.html">喪神</a>は、これを[[装備]]している<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>が<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>を離れ、装備されているこれが戦場から<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>に置かれたときにも発動できる。</p>
<p><a href="%E8%A6%AA%E9%B8%9E.html">親鸞</a>と一緒に使えば、これが冥装で墓地から離れたときにもドローできる。</p>
