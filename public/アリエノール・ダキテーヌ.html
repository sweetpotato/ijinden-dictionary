<h1 class="title">アリエノール・ダキテーヌ</h1>
<div class="main">
<div id="content">
<p><a href="%E7%A0%B4%E5%A3%8A%E8%80%90%E6%80%A7.html">破壊耐性</a>を持つ<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>に<a href="%E8%B5%A4.html">赤</a>と<a href="%E9%9D%92.html">青</a>を与える能力も持つ。</p>
<p>破壊耐性では自分の<a href="%E5%B1%B1%E6%9C%AD.html">山札</a>2枚を削るので<a href="%E5%A2%93%E5%9C%B0%E8%82%A5%E3%82%84%E3%81%97.html">墓地肥やし</a>もでき、同じ<a href="%E7%AC%AC4%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第4弾</a>のカードでは<a href="%E3%83%AB%E3%82%A414%E4%B8%96.html">ルイ14世</a>と相性が良い。また、あらかじめ<a href="%E9%81%A0%E5%BE%81%E8%BB%8D.html">遠征軍</a>を<a href="%E5%B1%B1%E6%9C%AD%E3%81%AE%E4%B8%8A.html">山札の上</a>に<a href="%E6%88%BB%E3%81%99.html">戻して</a>おけば、相手の<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AF%E3%82%B9%E3%83%86%E3%83%83%E3%83%97.html">アタック</a>に対してダキテーヌで<a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AF%E3%82%B9%E3%83%86%E3%83%83%E3%83%97.html">ブロック</a>して破壊耐性を発動し、遠征軍を山札から<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>に置いて相手の<a href="%E3%83%90%E3%83%88%E3%83%AB.html">バトル</a>と<a href="%E3%82%BF%E3%83%BC%E3%83%B3.html">ターン</a>を強制終了できる。</p>
<p>総じて、守りが固いイジンであり、黄を含むコントロールデッキに採用されることがある。</p>
