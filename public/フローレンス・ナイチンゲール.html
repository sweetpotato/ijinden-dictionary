<h1 class="title">フローレンス・ナイチンゲール</h1>
<div class="main">
<div id="content">
<p><a href="%E5%8F%8D%E9%AD%82.html">反魂</a>と<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>補充能力を持つ<a href="%E5%8C%BB%E8%A1%93.html">医術</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p>2つの能力は噛み合っており、ガーディアンが残っている間は<a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊</a>による<a href="%E9%99%A4%E5%8E%BB.html">除去</a>はほぼ不可能である。<a href="%E3%83%AB%E3%83%BC%E3%83%8A.html">ルーナ</a>や<a href="%E3%83%A9%E3%83%BB%E3%82%B3%E3%83%AD%E3%83%BC%E3%83%AB.html">ラ・コロール</a>といった破壊でない方法で除去したり、<a href="%E6%A3%AE%E9%96%91%E3%81%9F%E3%82%8B%E9%9B%A2%E5%AE%AE.html">森閑たる離宮</a>を併用して反魂を妨害するなどしたい。</p>
<p><a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>が0なので、ガーディアンに<a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AF%E3%82%B9%E3%83%86%E3%83%83%E3%83%97.html">ブロック</a>されても<a href="%E3%83%90%E3%83%88%E3%83%AB%E8%A7%A3%E6%B1%BA.html">バトル解決</a>で一方的に負けて破壊される。この特徴により[[青紫徴募]]では、いわば5枚目以降の<a href="%E9%91%91%E7%9C%9F.html">鑑真</a>として採用される。</p>
<p><a href="%E5%96%80%E8%A1%80%E3%81%AE%E6%B5%81%E8%A1%8C%E3%82%8A%E7%97%85.html">喀血の流行り病</a>と一緒に使えば、自分はノーリスクで相手のイジンを一方的に破壊できる。</p>
