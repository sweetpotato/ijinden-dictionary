<h1 class="title">日野富子</h1>
<div class="main">
<div id="content">
<p><a href="%E3%80%8E%E3%82%B9%E3%83%88%E3%83%BC%E3%83%B3%E3%80%8F%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">『ストーン』マリョク</a>でアドバンテージを稼げる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p><a href="%E3%83%87%E3%83%83%E3%82%AD.html">デッキ</a>を『ストーン』マリョクにある程度寄せておく必要があるため、<a href="%E9%AD%94%E5%8A%9B%E3%83%AC%E3%83%99%E3%83%AB.html">魔力レベル</a>を速やかに伸ばすこととは異なった戦略が求められる。</p>
<p><a href="%E7%AC%AC3%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第3弾</a>で[[ストーンマスク]]が登場したことにより強化された。このシナジーを採用したデッキが<a href="%E7%9F%B3%E4%BB%AE%E9%9D%A2%E5%AF%8C%E5%AD%90.html">石仮面富子</a>である。</p>
<p><a href="%E7%AC%AC5%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第5弾</a>で[[ハースストーン]]が登場したことによりさらに強化された。</p>
