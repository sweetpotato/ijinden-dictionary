<h1 class="title">小野小町</h1>
<div class="main">
<div id="content">
<p><a href="%E5%9F%B7%E7%AD%86.html">執筆</a>で<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>に<a href="%E7%BE%8E%E8%A1%93.html">美術</a>と<a href="%E9%9F%B3%E6%A5%BD.html">音楽</a>を与えつつ、美術イジンと音楽イジンを<a href="%E9%AD%94%E5%8A%9B%E3%82%BE%E3%83%BC%E3%83%B3.html">魔力ゾーン</a>に<a href="%E9%99%A4%E5%8E%BB.html">除去</a>する能力も持つイジン。</p>
<p>2つの能力は噛み合っている。単体での率直な使い方としては、相手のイジンに美術と音楽を与えた後にこれを<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>にして、除去か<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>による<a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AF%E3%82%B9%E3%83%86%E3%83%83%E3%83%97.html">ブロック</a>かを迫ることができる。</p>
<p><a href="%E8%91%9B%E9%A3%BE%E5%BF%9C%E7%82%BA.html">葛飾応為</a>と一緒に使えば、応為の能力で<a href="%E6%89%8B%E6%9C%AD.html">手札</a>に<a href="%E6%88%BB%E3%81%99.html">戻す</a>イジンの幅を広げられる。</p>
