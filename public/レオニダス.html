<div class="main">
<div id="content">
<p>相手の<a href="%E5%B1%B1%E6%9C%AD.html">山札</a>を削りつつ、条件付きで<a href="%E3%83%A2%E3%83%BC%E3%82%BF%E3%83%AB.html">モータル</a>を得られる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p>2つの能力は噛み合っている。[[青紫徴募]]では<a href="%E3%83%94%E3%83%A7%E3%83%BC%E3%83%88%E3%83%AB%E5%A4%A7%E5%B8%9D.html">ピョートル大帝</a>および<a href="%E6%9A%B4%E9%A2%A8%E5%B2%AC.html">暴風岬</a>と一緒に使用してこれを何度も戦場に置き、モータルや山札切れを狙う。</p>
