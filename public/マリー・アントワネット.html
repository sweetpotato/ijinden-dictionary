<h1 class="title">マリー・アントワネット</h1>
<div class="main">
<div id="content">
<p><a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊された</a>ときに自分と相手の<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>を<a href="%E5%AF%9D%E3%81%8B%E3%81%9B%E3%82%8B.html">寝かせる</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p>積極的に破壊する方法さえあれば、相手のガーディアンを無力化して<a href="%E7%9B%B4%E6%8E%A5%E6%94%BB%E6%92%83.html">直接攻撃</a>するチャンスを生むこともできる。<a href="%E9%9D%A9%E5%91%BD%E3%81%AE%E5%BA%83%E5%A0%B4.html">革命の広場</a>、<a href="%E3%83%90%E3%83%AC%E3%83%83%E3%83%88.html">バレット</a>、[[カタストロフィ]]などが候補に挙がる。[[道長ループ]]や[[親鸞カタストロフィ]]がこのギミックを採用している。</p>
<p>やみくもに召喚して相手に破壊されてしまうとピンチを招く。召喚するタイミングには気をつけたい。</p>
