<h1 class="title">赤</h1>
<div class="main">
<div id="content">
<p>赤は<a href="%E3%82%A4%E3%82%B8%E3%83%B3%E3%83%87%E3%83%B3.html">イジンデン</a>における<a href="%E8%89%B2.html">色</a>のひとつである。</p>
<h2 id="解説">解説</h2>
<p><a href="%E7%AC%AC1%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第1弾</a>から存在する色である。この色の<a href="%E3%82%B9%E3%82%BF%E3%83%BC%E3%82%BF%E3%83%BC%E3%82%BB%E3%83%83%E3%83%88.html">スターターセット</a>は<a href="%E4%BC%9D%E8%AA%AC%E3%81%AE%E6%AD%A6%E5%B0%86.html">伝説の武将</a>デッキである。</p>
<p><a href="%E3%82%AB%E3%83%B3%E3%83%86%E3%83%A9.html">カンテラ</a>、<a href="%E3%83%95%E3%82%A1%E3%82%A4%E3%82%A2%E3%82%BD%E3%83%BC%E3%83%89.html">ファイアソード</a>、[[熒惑のピラー]]など、火のイメージを持つ。</p>
