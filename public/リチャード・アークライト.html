<h1 class="title">リチャード・アークライト</h1>
<div class="main">
<div id="content">
<p>2つの能力で[[ランデス]]できる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p>1つ目の能力は[[小林虎三郎]]と相性が良い。相手が虎三郎を嫌って<a href="%E7%A8%AE.html">種</a>でなく<a href="%E3%82%AA%E3%83%BC%E3%83%96.html">オーブ</a>を採用していても、オーブを裏にして虎三郎の能力を有効化できる。ただし自分の<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>2以上の<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>も裏にするので、戦場に置くタイミングには気をつけたい。</p>
<p>2つ目の能力では相手だけでなく自分の<a href="%E8%A3%8F%E9%AD%94%E5%8A%9B.html">裏魔力</a>も戻せるので、<a href="%E3%82%A8%E3%83%AA%E3%82%B6%E3%83%99%E3%82%B91%E4%B8%96.html">エリザベス1世</a>と相性が良い。また、[[熒惑テンポ]]では<a href="%E6%B6%88%E8%80%97.html">消耗</a>した<a href="%E3%83%94%E3%83%A9%E3%83%BC.html">ピラー</a>を回収するために使われる。</p>
