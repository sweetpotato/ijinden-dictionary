<h1 class="title">モナ・リザ</h1>
<div class="main">
<div id="content">
<p><a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%82%A8%E3%83%B3%E3%82%B8%E3%83%B3.html">ドローエンジン</a>と<a href="%E5%A2%93%E5%9C%B0%E8%82%A5%E3%82%84%E3%81%97.html">墓地肥やし</a>を兼ねた<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>。</p>
<p><a href="%E5%A2%93%E5%9C%B0.html">墓地</a>に置くカードは<a href="%E7%BE%8E%E8%A1%93.html">美術</a>カードである必要があるため、デッキ構築の段階で美術に寄せておく必要がある。そのようなデッキのひとつに<a href="%E7%90%B3%E6%B4%BE%E7%BE%8E%E8%A1%93.html">琳派美術</a>がある。</p>
<p>美術を持つがハイケイなので、美術<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>としてはカウントしない。</p>
<p>カード名は<a href="%E3%83%AC%E3%82%AA%E3%83%8A%E3%83%AB%E3%83%89%E3%83%BB%E3%83%80%E3%83%BB%E3%83%B4%E3%82%A3%E3%83%B3%E3%83%81.html">レオナルド・ダ・ヴィンチ</a>による絵画。</p>
