<h1 class="title">足利義満</h1>
<div class="main">
<div id="content">
<p>自分の他の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>の<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>性能を上げ、さらに条件付きで<a href="%E8%88%AA%E6%B5%B7.html">航海</a>も与えるイジン。</p>
<p>元々の<a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>が2000のイジンがこれにより<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AF%EF%BC%8B.html">アタック＋</a>1000を得ている状況でアタッカーになったら、パワー3000になるので、これにより航海を得てドローする。</p>
<p>アタック＋を与えるので<a href="%E3%82%B8%E3%83%A7%E3%83%BC%E3%82%B8%E3%83%BB%E3%83%AF%E3%82%B7%E3%83%B3%E3%83%88%E3%83%B3.html">ジョージ・ワシントン</a>とは相性が良い。</p>
<p>航海を与えるので<a href="%E8%A7%92%E5%80%89%E4%BA%86%E4%BB%A5.html">角倉了以</a>とも相性が良い。この組合せを採用したデッキが<a href="%E8%A7%92%E5%80%89%E8%88%AA%E6%B5%B7.html">角倉航海</a>である。</p>
<p>これが与えた航海で大量ドローし、<a href="%E3%83%95%E3%82%A1%E3%82%A4%E3%83%8A%E3%83%AB%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AF.html">ファイナルアタック</a>で追撃するデッキが<a href="%E7%BE%A9%E6%BA%80%E3%83%95%E3%82%A1%E3%82%A4%E3%83%8A%E3%83%AB.html">義満ファイナル</a>である。</p>
