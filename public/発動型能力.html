<h1 class="title">発動型能力</h1>
<div class="main">
<div id="content">
<p>発動型能力とは、このサイトで使われる<strong>非公式</strong>のルール用語であり、<a href="%E3%83%AB%E3%83%BC%E3%83%AB%E3%83%86%E3%82%AD%E3%82%B9%E3%83%88.html">ルールテキスト</a>に「［何らかのきっかけが起きた］<strong>とき</strong>」または「［何らかのきっかけが起きる］<strong>たび</strong>」と書かれた<a href="%E8%83%BD%E5%8A%9B.html">能力</a>をいう。</p>
<h2 id="解説">解説</h2>
<p>何らかのきっかけを引き金にして単発で発揮される能力である。</p>
<p>「発動」と明に書かれている必要はない。また「発動」（はつどう）と「発揮」（はっき）は字面が似ているが異なる概念であることに注意されたい。</p>
<p><a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>は発動型能力の一種である。</p>
</div>
