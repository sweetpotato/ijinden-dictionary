<h1 class="title">冥府発動</h1>
<div class="main">
<div id="content">
<p>冥府発動（めいふはつどう）は<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>のひとつであり、また<a href="%E3%82%AD%E3%83%BC%E3%83%AF%E3%83%BC%E3%83%89%E8%83%BD%E5%8A%9B.html">キーワード能力</a>のひとつである。冥府発動を持つ<a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>が<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>から<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>に置かれたとき、<a href="%E3%83%AC%E3%83%99%E3%83%AB%E6%9D%A1%E4%BB%B6.html">レベル条件</a>、<a href="%E8%89%B2%E6%9D%A1%E4%BB%B6.html">色条件</a>、および[[魔力コスト条件]]を無視して、その<a href="%E8%83%BD%E5%8A%9B.html">能力</a>を発動できる。ただし[[発動の手続]]は満たす必要がある。</p>
<h2 id="解説">解説</h2>
<p><a href="%E7%AC%AC1%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第1弾</a>から存在する、逆転を演出する遺業能力である。</p>
<p>マホウが戦場に表向きで置かれることは（装備されているカードを除いて）ないため、典型的には<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>であるようなマホウが戦場から墓地に置かれたときに冥府発動できる。</p>
