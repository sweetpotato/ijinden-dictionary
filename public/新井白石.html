<h1 class="title">新井白石</h1>
<div class="main">
<div id="content">
<p>相手の<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>を<a href="%E5%AF%9D%E3%81%8B%E3%81%9B%E3%82%8B.html">寝かせ</a>、また相手の<a href="%E5%AF%9D%E3%81%A6%E3%81%84%E3%82%8B.html">寝ている</a>ハイケイの能力を失わせる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p>寝かせたハイケイは次の相手の<a href="%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%88%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">スタートフェイズ</a>で<a href="%E8%B5%B7%E3%81%93%E3%81%99.html">起きる</a>ものの、それまでの1ターンの間は無力化できることから、<a href="%E5%86%86%E5%BD%A2%E9%97%98%E6%8A%80%E5%A0%B4.html">円形闘技場</a>などへの対策カードになる。</p>
<p>これが戦場を離れたら、寝ているハイケイは失っていた能力を取り戻す。</p>
