<h1 class="title">エカチェリーナ2世</h1>
<div class="main">
<div id="content">
<p>相手の<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF%E9%85%8D%E7%BD%AE.html">マリョク配置</a>に制約をかける<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。相手の<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>の数だけ<a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>も上がる。</p>
<p>典型的には1ターン目に使える<a href="%E6%B1%BA%E8%B5%B7.html">決起</a>対策カードである。ただし、<a href="%E5%BE%A9%E5%85%83.html">復元</a>によってマリョクの数が3つから4つになることは防げないため、過信しないようにしたい。</p>
