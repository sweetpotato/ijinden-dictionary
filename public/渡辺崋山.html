<h1 class="title">渡辺崋山</h1>
<div class="main">
<div id="content">
<p><a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドロー</a>能力と<a href="%E3%83%8F%E3%83%B3%E3%83%87%E3%82%B9.html">ハンデス</a>能力を持つ<a href="%E7%BE%8E%E8%A1%93.html">美術</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p>1つ目のドロー能力は自身も数えるので、最低でも1ドローできる。</p>
<p>2つ目のハンデス能力は<a href="%E3%82%BF%E3%83%BC%E3%83%B3%E3%83%97%E3%83%AC%E3%82%A4%E3%83%A4%E3%83%BC.html">ターンプレイヤー</a>の<a href="%E6%89%8B%E6%9C%AD.html">手札</a>を<a href="%E6%8D%A8%E3%81%A6%E3%82%8B.html">捨てさせる</a>ので、基本的には相手のターンに発動させたい。</p>
<p>[[土方リバイバル]]では<a href="%E3%83%89%E3%83%8A%E3%83%86%E3%83%83%E3%83%AD.html">ドナテッロ</a>とあわせて初動イジンに採用される。</p>
