<h1 class="title">緒方洪庵</h1>
<div class="main">
<div id="content">
<p>プレイヤーが<a href="%E6%89%8B%E6%9C%AD.html">手札</a>から<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>を捨てるたびに<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドローさせる</a><a href="%E5%8C%BB%E8%A1%93.html">医術</a>イジン。</p>
<p><a href="%E5%BE%B3%E5%B7%9D%E6%85%B6%E5%96%9C.html">徳川慶喜</a>と一緒に使えば、相手がイジンでないカードを捨てるまでドローと<a href="%E3%83%8F%E3%83%B3%E3%83%87%E3%82%B9.html">ハンデス</a>を反復できる。これを狙ったデッキが<a href="%E5%8C%BB%E8%A1%93%E3%83%8F%E3%83%B3%E3%83%87%E3%82%B9.html">医術ハンデス</a>である。</p>
