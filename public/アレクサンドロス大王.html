<h1 class="title">アレクサンドロス大王</h1>
<div class="main">
<div id="content">
<p><a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>になったときに相手の<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>を<a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊できる</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。<a href="%E5%8D%B3%E5%BF%9C.html">即応</a>を持っているので、召喚された<a href="%E3%82%BF%E3%83%BC%E3%83%B3.html">ターン</a>のうちに能力を発動できる。<a href="%E6%96%B0%E6%97%A7.html">新旧</a>で<a href="%E3%83%AB%E3%83%BC%E3%83%AB%E3%83%86%E3%82%AD%E3%82%B9%E3%83%88.html">ルールテキスト</a>は異なるが、実質的な性能は同じである。</p>
<p>相手を選ぶイジンのため<a href="%E3%82%B5%E3%82%A4%E3%83%89%E3%83%87%E3%83%83%E3%82%AD.html">サイドデッキ</a>要員か。</p>
<p>[[フィリッポス2世]]の能力で<a href="%E6%89%8B%E6%9C%AD.html">手札</a>から<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>に置ける。</p>
