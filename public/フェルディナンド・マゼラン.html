<h1 class="title">フェルディナンド・マゼラン</h1>
<div class="main">
<div id="content">
<p><a href="%E8%88%AA%E6%B5%B7.html">航海</a>で<a href="%E3%83%8F%E3%83%B3%E3%83%87%E3%82%B9.html">ハンデス</a>できる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。<a href="%E6%96%B0%E6%97%A7.html">新旧</a>で<a href="%E3%83%AB%E3%83%BC%E3%83%AB%E3%83%86%E3%82%AD%E3%82%B9%E3%83%88.html">ルールテキスト</a>は異なるが、実質的な性能は同じである。</p>
<p>航海を発動させるためには、まず召喚し、さらに次の<a href="%E3%82%BF%E3%83%BC%E3%83%B3.html">ターン</a>で<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>にする必要がある。また、墓地に置くカードは相手が選ぶため、最も不要なカードを選ばれてしまう。このため、同じ<a href="%E9%9D%92.html">青</a>で<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>3の<a href="%E3%83%A1%E3%82%A2%E3%83%AA%E3%83%BC1%E4%B8%96.html">メアリー1世</a>と比べると、どうしても見劣りしてしまう。継続的にハンデスできる特徴を活かしたい。</p>
