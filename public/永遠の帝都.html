<h1 class="title">永遠の帝都</h1>
<div class="main">
<div id="content">
<p>自分の<a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AF%EF%BC%8B.html">ブロック＋</a>を持つイジンと<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>に<a href="%E7%A0%B4%E5%A3%8A%E8%80%90%E6%80%A7.html">破壊耐性</a>を与える<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>。さらに自分の<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>3以下のイジンにブロック＋も与えるので、結果的にこれらのイジンにも破壊耐性を与える。</p>
<p><a href="%E5%8B%9D%E6%B5%B7%E8%88%9F.html">勝海舟</a>と一緒に使うと、勝海舟やガーディアンを破壊することなく、勝海舟の能力を発動できるようになる。</p>
