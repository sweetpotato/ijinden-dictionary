<h1 class="title">マリョク配置</h1>
<div class="main">
<div id="content">
<p>マリョク配置とは、自分の<a href="%E3%83%A1%E3%82%A4%E3%83%B3%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">メインフェイズ</a>の間に<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF%E9%85%8D%E7%BD%AE%E6%A8%A9.html">マリョク配置権</a>を1つ使って、手札から<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>1つを<a href="%E8%A1%A8%E5%90%91%E3%81%8D.html">表向き</a>で、または任意のカード1つを<a href="%E8%A3%8F%E5%90%91%E3%81%8D.html">裏向き</a>で<a href="%E9%AD%94%E5%8A%9B%E3%82%BE%E3%83%BC%E3%83%B3.html">魔力ゾーン</a>に置くことをいう。</p>
<h2 id="解説">解説</h2>
<p>マリョクを魔力ゾーンに置く基本的な方法である。俗に、単に配置ともいう。</p>
