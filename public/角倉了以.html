<h1 class="title">角倉了以</h1>
<div class="main">
<div id="content">
<p><a href="%E8%88%AA%E6%B5%B7.html">航海</a>が発動したときに相手の<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>を<a href="%E9%99%A4%E5%8E%BB.html">除去</a>できる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p><a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>、特に<a href="%E5%86%A5%E5%BA%9C%E7%99%BA%E5%8B%95.html">冥府発動</a>のリスクなく、相手のガーディアンを除去できる能力は強力である。自分の他のイジンに航海を与える<a href="%E8%B6%B3%E5%88%A9%E7%BE%A9%E6%BA%80.html">足利義満</a>とは相性が良く、この組合せを採用したデッキが<a href="%E8%A7%92%E5%80%89%E8%88%AA%E6%B5%B7.html">角倉航海</a>である。</p>
<p>〈「航海」が発動したとき〉とは、航海が発動を待っている状態になったときではなく、実際に発動したときである。したがって、複数の航海が同時に発動を待っている状態になっても、ひとつずつ実際に発動したことをきっかけにして、これの能力が発動する。</p>
