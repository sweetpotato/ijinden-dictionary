<h1 class="title">行基</h1>
<div class="main">
<div id="content">
<p>自分の<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>の<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>の数だけ<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドローする</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。ハイケイに間接的な<a href="%E7%A0%B4%E5%A3%8A%E8%80%90%E6%80%A7.html">破壊耐性</a>も与える。</p>
<p>戦場に置かれたときに<a href="%E3%82%A4%E3%82%B8%E3%83%B3%E5%8F%AC%E5%96%9A%E6%A8%A9.html">イジン召喚権</a>も増やすので、ドローしたカードの中に<a href="%E8%A1%8C%E5%9F%BA.html">行基</a>があれば、行基の召喚を連鎖できる。これを狙ったデッキが<a href="%E3%82%BF%E3%83%BC%E3%83%9C%E8%A1%8C%E5%9F%BA.html">ターボ行基</a>である。</p>
<p>1つ目の能力によるドローは強制である。<a href="%E5%B1%B1%E6%9C%AD%E5%88%87%E3%82%8C.html">山札切れ</a>には注意したい。</p>
<p>2つ目の能力は<a href="%E3%82%B5%E3%83%B3%E3%83%80%E3%83%BC%E3%83%9C%E3%83%AB%E3%83%88.html">サンダーボルト</a>や<a href="%E3%82%B9%E3%82%AB%E3%83%BC%E3%83%AC%E3%83%83%E3%83%88.html">スカーレット</a>への対策として役立つ。<a href="%E8%92%B8%E6%B0%97%E6%A9%9F%E9%96%A2%E8%BB%8A.html">蒸気機関車</a>を[[装備]]させて<a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>4000超過を維持すれば行基自身も破壊されなくなる。ただし、自分の能力でも破壊されなくなるので、自分のスカーレットとは相性が悪い。</p>
