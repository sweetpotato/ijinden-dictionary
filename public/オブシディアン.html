<h1 class="title">オブシディアン</h1>
<div class="main">
<div id="content">
<p><a href="%E7%84%A1%E8%89%B2.html">無色</a>だが<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>3の<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">マリョク</a>。</p>
<p>2ターン目に<a href="%E9%AD%94%E5%8A%9B%E3%83%AC%E3%83%99%E3%83%AB.html">魔力レベル</a>2から5へとジャンプできるので、<a href="%E5%86%86%E5%BD%A2%E9%97%98%E6%8A%80%E5%A0%B4.html">円形闘技場</a>や<a href="%E6%B5%AA%E5%A3%AB%E9%9B%86%E3%81%86%E9%95%B7%E5%B1%8B.html">浪士集う長屋</a>と相性が良い。<a href="%E9%9D%92%E5%8D%98%E9%97%98%E6%8A%80%E5%A0%B4.html">青単闘技場</a>を大きく強化したカードである。</p>
<p>印刷されている<a href="%E3%83%AC%E3%82%A2%E3%83%AA%E3%83%86%E3%82%A3.html">レアリティ</a>はN（ノーマル）だが、実際のカードはR（レア）のように箔押しされている。</p>
