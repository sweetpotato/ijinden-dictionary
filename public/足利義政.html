<h1 class="title">足利義政</h1>
<div class="main">
<div id="content">
<p><a href="%E8%B5%A4.html">赤</a>のイジンが<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>に置かれたときにメリットを得られる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。<a href="%E6%89%8B%E6%9C%AD.html">手札</a>さえ噛み合えば、<a href="%E3%82%A4%E3%82%B8%E3%83%B3%E5%8F%AC%E5%96%9A%E6%A8%A9.html">イジン召喚権</a>+2と2<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドロー</a>を反復して、イジンを次々と横並べできる。</p>
<p><a href="%E8%8B%B1%E5%82%91%E9%9B%86%E3%81%86%E5%A4%A7%E6%B2%B3.html">英傑集う大河</a>があれば、黄のイジンが戦場に置かれたとき、そのイジンは赤でもあるので、義政の能力が発動できる。このギミックを採用したデッキが<a href="%E7%BE%A9%E6%94%BF%E5%A4%A7%E6%B2%B3.html">義政大河</a>である。</p>
<p>山札が1枚以下の場合、2ドローする選択肢は選べず、イジン召喚権+2しか選べない（Q&amp;A参照）。</p>
<h2 id="QA">Q&amp;A</h2>
<p>Q. 山札が1枚以下ならどうするのか。</p>
<p>A. イジン召喚権+2します。</p>
<p>（公式Q&amp;Aより）</p>
