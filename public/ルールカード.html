<p>ルールカードは<a href="%E3%82%B9%E3%82%BF%E3%83%BC%E3%82%BF%E3%83%BC%E3%82%BB%E3%83%83%E3%83%88.html">スターターセット</a>に同梱されている、<a href="%E3%82%A4%E3%82%B8%E3%83%B3%E3%83%87%E3%83%B3.html">イジンデン</a>の遊び方を説明したカードである。</p>
<h2 id="解説">解説</h2>
<p>イジンデンのルールの拠り所のひとつである。</p>
<p>「カード」と呼んではいるが、イジンデンのロゴが印刷された通常の<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>とは異なり、両面にルールが記されている。</p>
