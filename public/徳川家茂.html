<h1 class="title">徳川家茂</h1>
<div class="main">
<div id="content">
<p>他の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>を<a href="%E5%AF%9D%E3%81%8B%E3%81%9B%E3%82%8B.html">寝かせられる</a>イジン。</p>
<p><a href="%E6%9D%BE%E5%B9%B3%E5%AE%9A%E4%BF%A1.html">松平定信</a>と一緒に使うと強力である。戦場に家茂がいる状況で定信を召喚し、まず家茂の能力を発動させ、続いて定信の能力を発動させれば、相手の戦場のイジンすべてを<a href="%E5%B1%B1%E6%9C%AD%E3%81%AE%E4%B8%8B.html">山札の下</a>に<a href="%E6%88%BB%E3%81%99.html">戻せる</a>。さらに、山札の下に戻った家茂を、定信の能力で<a href="%E6%89%8B%E6%9C%AD.html">手札</a>に加えられる。</p>
