<h1 class="title">山札の下</h1>
<div class="main">
<div id="content">
<p>山札の下とは、<a href="%E5%B1%B1%E6%9C%AD.html">山札</a>の一番下の位置である。俗に「ボトム」ともいう。</p>
<h2 id="解説">解説</h2>
<p>最後に引く<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>の位置である。また、ここにカードを<a href="%E6%88%BB%E3%81%99.html">戻す</a>効果が存在する。何もなければ再び引くことは難しいだろう。<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>よりもアクセスしづらいため、ここへの<a href="%E9%99%A4%E5%8E%BB.html">除去</a>は典型的には<a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊</a>除去よりも強力である。</p>
<p><a href="%E8%AB%B8%E8%91%9B%E4%BA%AE.html">諸葛亮</a>はここのカードを見て条件付きで<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>に置ける<a href="%E8%83%BD%E5%8A%9B.html">能力</a>を持つ。</p>
