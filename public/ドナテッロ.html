<h1 class="title">ドナテッロ</h1>
<div class="main">
<div id="content">
<p><a href="%E6%89%8B%E6%9C%AD.html">手札</a>の質を高めつつ、ささやかだが<a href="%E5%A2%93%E5%9C%B0%E8%82%A5%E3%82%84%E3%81%97.html">墓地肥やし</a>もできる<a href="%E7%BE%8E%E8%A1%93.html">美術</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p><a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>2000と<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>2にしては悪くない大きさであり、<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>で1ドローもできる。トータルで見て使いやすい性能である。</p>
<p>美術イジンなので<a href="%E3%83%AA%E3%83%90%E3%82%A4%E3%83%90%E3%83%AB.html">リバイバル</a>とは相性が良い。自身の能力で<a href="%E6%8D%A8%E3%81%A6%E3%82%8B.html">捨てた</a>カードを最速で2ターン目に戦場に置くことができる。<a href="%E5%86%86%E5%BD%A2%E9%97%98%E6%8A%80%E5%A0%B4.html">円形闘技場</a>、<a href="%E3%83%AC%E3%82%AA%E3%83%8A%E3%83%AB%E3%83%89%E3%83%BB%E3%83%80%E3%83%BB%E3%83%B4%E3%82%A3%E3%83%B3%E3%83%81.html">レオナルド・ダ・ヴィンチ</a>、[[土方歳三]]などの強力なカードを置きたい。</p>
<p>その使いやすさと特性から、<a href="%E3%83%80%E3%83%B4%E3%82%A3%E3%83%B3%E3%83%81%E3%83%AA%E3%83%90%E3%82%A4%E3%83%90%E3%83%AB.html">ダヴィンチリバイバル</a>、<a href="%E9%9D%92%E5%8D%98%E9%97%98%E6%8A%80%E5%A0%B4.html">青単闘技場</a>、<a href="%E8%B5%A4%E9%9D%92%E9%97%98%E6%8A%80%E5%A0%B4.html">赤青闘技場</a>、[[土方リバイバル]]など、様々なデッキの初動イジンとして採用される。</p>
