<h1 class="title">チャンピオン</h1>
<div class="main">
<div id="content">
<p>自分の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>を相手のイジンにブロックされなくする<a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>。<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>にはブロックされる。</p>
<p>あらかじめ<a href="%E3%83%9E%E3%83%AA%E3%83%BC%E3%83%BB%E3%82%A2%E3%83%B3%E3%83%88%E3%83%AF%E3%83%8D%E3%83%83%E3%83%88.html">マリー・アントワネット</a>や<a href="%E3%82%A8%E3%82%A4%E3%83%96%E3%83%A9%E3%83%8F%E3%83%A0%E3%83%BB%E3%83%AA%E3%83%B3%E3%82%AB%E3%83%B3.html">エイブラハム・リンカン</a>でガーディアンを無力化しておけば、相手に<a href="%E7%9B%B4%E6%8E%A5%E6%94%BB%E6%92%83.html">直接攻撃</a>が通るだろう。これを狙ったデッキが<a href="%E9%81%93%E9%95%B7%E3%83%AB%E3%83%BC%E3%83%97.html">道長ループ</a>や<a href="%E3%83%AA%E3%83%B3%E3%82%AB%E3%83%B3%E3%83%81%E3%83%A3%E3%83%B3%E3%83%94%E3%82%AA%E3%83%B3.html">リンカンチャンピオン</a>である。</p>
<p>カード名は「優勝者」や「闘士」。誰をも寄せ付けない頂点の武人のイメージか。</p>
