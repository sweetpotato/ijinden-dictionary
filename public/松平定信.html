<h1 class="title">松平定信</h1>
<div class="main">
<div id="content">
<p>相手の<a href="%E5%AF%9D%E3%81%A6%E3%81%84%E3%82%8B.html">寝ている</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>を<a href="%E9%99%A4%E5%8E%BB.html">除去</a>できるイジン。<a href="%E5%B1%B1%E6%9C%AD%E3%81%AE%E4%B8%8B.html">山札の下</a>からリソースを補充する能力も持つ。</p>
<p><a href="%E5%BE%B3%E5%B7%9D%E5%AE%B6%E8%8C%82.html">徳川家茂</a>と一緒に使うと強力である。戦場に家茂がいる状況で定信を召喚し、まず家茂の能力を発動させ、続いて定信の能力を発動させれば、相手の戦場のイジンすべてを<a href="%E5%B1%B1%E6%9C%AD%E3%81%AE%E4%B8%8B.html">山札の下</a>に戻せる。さらに、山札の下に戻った家茂を、定信の能力で<a href="%E6%89%8B%E6%9C%AD.html">手札</a>に加えられる。</p>
<p><a href="%E3%82%B0%E3%82%B9%E3%82%BF%E3%83%952%E4%B8%96%E3%82%A2%E3%83%89%E3%83%AB%E3%83%95.html">グスタフ2世アドルフ</a>や<a href="%E3%83%94%E3%83%BC%E3%82%B3%E3%83%83%E3%82%AF.html">ピーコック</a>と一緒に使っても強力である。この組合せを採用したデッキが<a href="%E3%82%B0%E3%82%B9%E3%82%BF%E3%83%95%E6%9D%BE%E5%B9%B3.html">グスタフ松平</a>である。</p>
