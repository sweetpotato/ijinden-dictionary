<h1 class="title">青</h1>
<div class="main">
<div id="content">
<p>青は<a href="%E3%82%A4%E3%82%B8%E3%83%B3%E3%83%87%E3%83%B3.html">イジンデン</a>における<a href="%E8%89%B2.html">色</a>のひとつである。</p>
<h2 id="解説">解説</h2>
<p><a href="%E7%AC%AC1%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第1弾</a>から存在する色である。この色の<a href="%E3%82%B9%E3%82%BF%E3%83%BC%E3%82%BF%E3%83%BC%E3%82%BB%E3%83%83%E3%83%88.html">スターターセット</a>は<a href="%E7%BE%8E%E3%81%A8%E7%9F%A5%E3%81%AE%E9%9D%A9%E5%91%BD.html">美と知の革命</a>デッキである。</p>
<p><a href="%E3%82%A6%E3%82%A9%E3%83%BC%E3%82%BF%E3%83%BC%E3%83%9D%E3%83%83%E3%83%88.html">ウォーターポット</a>、<a href="%E3%82%A2%E3%82%A4%E3%82%B9%E3%82%BD%E3%83%BC%E3%83%89.html">アイスソード</a>、[[ハイドロオーラ]]、[[辰星のピラー]]など、水のイメージを持つ。</p>
