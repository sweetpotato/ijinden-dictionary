<h1 class="title">エイジング</h1>
<div class="main">
<div id="content">
<p>相手の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>を<a href="%E9%AD%94%E5%8A%9B%E3%82%BE%E3%83%BC%E3%83%B3.html">魔力ゾーン</a>に<a href="%E9%99%A4%E5%8E%BB.html">除去</a>できる<a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>。</p>
<p><a href="%E9%AD%94%E5%8A%9B%E3%82%B3%E3%82%B9%E3%83%88.html">魔力コスト</a>が2と大きいのが難点だが、[[破壊]]除去ではないので、<a href="%E8%A6%AA%E9%B8%9E.html">親鸞</a>などの<a href="%E7%A0%B4%E5%A3%8A%E8%80%90%E6%80%A7.html">破壊耐性</a>を持つイジンにも使える。</p>
<p>[[デス虎コントロール]]では、相手の魔力ゾーンに強制的に<a href="%E8%A3%8F%E9%AD%94%E5%8A%9B.html">裏魔力</a>を作る手段として使える。</p>
<p>カード名は「老化」。経年の変化が魔力として凝集するイメージか。</p>
