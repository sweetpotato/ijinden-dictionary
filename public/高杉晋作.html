<h1 class="title">高杉晋作</h1>
<div class="main">
<div id="content">
<p><a href="%E5%BE%B4%E5%8B%9F.html">徴募</a>で<a href="%E6%89%8B%E6%9C%AD.html">手札</a>の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>を<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>に置ける<a href="%E6%80%9D%E6%83%B3.html">思想</a>イジン。</p>
<p>徴募の範囲は<a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>2000以下と狭いが、<a href="%E9%91%91%E7%9C%9F.html">鑑真</a>や<a href="%E3%83%A1%E3%82%A2%E3%83%AA%E3%83%BC1%E4%B8%96.html">メアリー1世</a>を戦場に置くぶんには十分だろう。<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドロー</a>もできるので、範囲内の手札のイジンは<a href="%E3%83%94%E3%83%A7%E3%83%BC%E3%83%88%E3%83%AB%E5%A4%A7%E5%B8%9D.html">ピョートル大帝</a>よりもこちらの徴募を優先的に使って戦場に置きたい。</p>
<p>初動イジンおよび徴募を持つイジンとして<a href="%E9%9D%92%E9%BB%84%E5%BE%B4%E5%8B%9F.html">青黄徴募</a>に採用される。</p>
