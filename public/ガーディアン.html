<h1 class="title">ガーディアン</h1>
<div class="main">
<div id="content">
<p>ガーディアンとは<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>に<a href="%E8%A3%8F%E5%90%91%E3%81%8D.html">裏向き</a>で置かれている<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>であり、<a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AF%E3%82%B9%E3%83%86%E3%83%83%E3%83%97.html">ブロックステップ</a>で<a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AB%E3%83%BC.html">ブロッカー</a>に選ぶことができる。</p>
<h2 id="解説">解説</h2>
<p>相手の攻撃を防ぐカードである。<a href="%E3%82%B2%E3%83%BC%E3%83%A0.html">ゲーム</a>開始時のガーディアンは4体である。</p>
<p>俗に「盾」とも呼ばれる。語源はデュエル・マスターズで同様の機能を担う「シールド」である。</p>
<h2 id="ルール">ルール</h2>
<p>ガーディアンは<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>ではない。ガーディアンは<a href="%E5%BA%83%E7%BE%A9%E3%81%AE%E7%89%B9%E6%80%A7.html">広義の特性</a>を持たない。</p>
</div>
