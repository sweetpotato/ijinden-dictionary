<h1 class="title">ナポレオン・ボナパルト</h1>
<div class="main">
<div id="content">
<p><a href="%E5%BE%B4%E5%8B%9F.html">徴募</a>で自身を<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>に置くか<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>を補充できるイジン。</p>
<p>自身以外のイジンは戦場に置けないし、有用な<a href="%E5%86%A5%E5%BA%9C%E7%99%BA%E5%8B%95.html">冥府発動</a>を持つ<a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>を<a href="%E6%89%8B%E6%9C%AD.html">手札</a>や<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>からガーディアンに仕込むこともできない。このため、<a href="%E3%83%94%E3%83%A7%E3%83%BC%E3%83%88%E3%83%AB%E5%A4%A7%E5%B8%9D.html">ピョートル大帝</a>や<a href="%E6%9B%B9%E6%93%8D.html">曹操</a>と比べると、どうしても器用貧乏に見えてしまう。</p>
