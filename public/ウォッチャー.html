<h1 class="title">ウォッチャー</h1>
<div class="main">
<div id="content">
<p>ウォッチャーは<a href="%E5%B8%B8%E5%9C%A8%E5%9E%8B%E8%83%BD%E5%8A%9B.html">常在型能力</a>であり、また<a href="%E3%82%AD%E3%83%BC%E3%83%AF%E3%83%BC%E3%83%89%E8%83%BD%E5%8A%9B.html">キーワード能力</a>のひとつである。ウォッチャーを持つイジンは、<a href="%E5%AF%9D%E3%81%A6%E3%81%84%E3%82%8B.html">寝ている</a>状態でも、<a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AF%E3%82%B9%E3%83%86%E3%83%83%E3%83%97.html">ブロックステップ</a>で<a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AB%E3%83%BC.html">ブロッカー</a>に選ぶことができる。</p>
<h2 id="解説">解説</h2>
<p><a href="%E7%AC%AC2%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第2弾</a>で追加された、<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>になって寝た次の相手のターンでもブロッカーになれる能力である。</p>
<h2 id="ルール">ルール</h2>
<p>ウォッチャーを持っていて寝ているブロッカーがウォッチャーを失っても、それはブロッカーのままである。ウォッチャーはあくまでブロッカーに選ぶ際にだけ発揮される。</p>
<p>ウォッチャーは重複しない。何らかの理由で1体のイジンが2つ以上のウォッチャーを得ても、1つだけ得た場合と変わりはない。</p>
