<h1 class="title">本居宣長</h1>
<div class="main">
<div id="content">
<p>自分と相手が互いに<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドロー</a>できる<a href="%E5%8C%BB%E8%A1%93.html">医術</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。これが戦場に置かれたときにも、これ自身の能力を発動できる。</p>
<p><a href="%E5%BE%B3%E5%B7%9D%E6%85%B6%E5%96%9C.html">徳川慶喜</a>と<a href="%E7%B7%92%E6%96%B9%E6%B4%AA%E5%BA%B5.html">緒方洪庵</a>によるハンデスループの着火剤として、<a href="%E5%8C%BB%E8%A1%93%E3%83%8F%E3%83%B3%E3%83%87%E3%82%B9.html">医術ハンデス</a>に採用される。</p>
