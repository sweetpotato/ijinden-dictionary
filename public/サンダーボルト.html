<h1 class="title">サンダーボルト</h1>
<div class="main">
<div id="content">
<p>相手の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>と<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>を大量<a href="%E9%99%A4%E5%8E%BB.html">除去</a>しつつ、<a href="%E5%86%A5%E5%BA%9C%E7%99%BA%E5%8B%95.html">冥府発動</a>でない<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>も妨害する<a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>。</p>
<p><a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>6・<a href="%E9%AD%94%E5%8A%9B%E3%82%B3%E3%82%B9%E3%83%88.html">魔力コスト</a>3と重いが、<a href="%E5%8F%8D%E9%AD%82.html">反魂</a>や<a href="%E6%9C%A8%E9%9C%8A.html">木霊</a>を許さず、また<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドロー</a>による逆転も防ぎながら相手の戦力を一掃できるので、<a href="%E8%B5%A4%E5%8D%98%E3%82%A2%E3%82%B0%E3%83%AD.html">赤単アグロ</a>や<a href="%E8%B5%A4%E7%B4%AB%E9%9B%A2%E5%AE%AE.html">赤紫離宮</a>に最後のひと押しとして採用される。ただし、<a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>5000になった<a href="%E3%83%9E%E3%83%AB%E3%83%86%E3%82%A3%E3%83%B3%E3%83%BB%E3%83%AB%E3%82%BF%E3%83%BC.html">マルティン・ルター</a>、<a href="%E7%A0%B4%E5%A3%8A%E3%81%95%E3%82%8C%E3%81%AA%E3%81%84.html">破壊されない</a><a href="%E8%A6%AA%E9%B8%9E.html">親鸞</a>、<a href="%E7%A0%B4%E5%A3%8A%E3%81%95%E3%82%8C%E3%81%A6%E3%81%84%E3%81%AA%E3%81%84.html">破壊されていない</a>状態にする[[アリエノール・ダキテーヌ]]などは破壊できないことに注意したい。</p>
<p><a href="%E5%9F%B7%E7%AD%86.html">執筆</a>系デッキの天敵でもある。対策するなら<a href="%E8%A1%8C%E5%9F%BA.html">行基</a>と<a href="%E8%92%B8%E6%B0%97%E6%A9%9F%E9%96%A2%E8%BB%8A.html">蒸気機関車</a>を一緒に使いたい。</p>
<p>カード名は「落雷」「稲妻」。</p>
