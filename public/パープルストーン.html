<p>典型的には<a href="%E3%83%91%E3%83%BC%E3%83%97%E3%83%AB%E3%82%AA%E3%83%BC%E3%83%96.html">パープルオーブ</a>の[[下位互換]]であり、所持カードが充実するにつれて使われなくなっていくカードだろう。</p>
