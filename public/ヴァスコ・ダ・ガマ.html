<p>航海を発動させるためには、まず<a href="%E3%82%A4%E3%82%B8%E3%83%B3%E5%8F%AC%E5%96%9A.html">イジン召喚</a>し、さらに次のターンで<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>にする必要がある。そのため、同じ<a href="%E9%9D%92.html">青</a>で初動イジンの<a href="%E3%83%89%E3%83%8A%E3%83%86%E3%83%83%E3%83%AD.html">ドナテッロ</a>と比べると、どうしても悠長に見えてしまう。</p>
