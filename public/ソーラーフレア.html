<div class="main">
<div id="content">
<p>2つの効果を選べる<a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>。</p>
<p>1つ目の効果は<a href="%E9%81%81%E7%94%B2%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">遁甲マリョク</a>への対策になる。もっぱら、こちらを目的に使われることが多いカードだろう。</p>
<p>2つ目の効果は、いわゆる衝動的<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドロー</a>であり、1つ目の効果の使い道がない場合でも完全に腐ることはない。</p>
<p>カード名は「太陽面爆発」。</p>
