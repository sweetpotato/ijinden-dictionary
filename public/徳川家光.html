<h1 class="title">徳川家光</h1>
<div class="main">
<div id="content">
<p>自分の<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>の<a href="%E8%89%B2.html">色</a>の数だけ<a href="%E3%82%A4%E3%82%B8%E3%83%B3%E5%8F%AC%E5%96%9A%E6%A8%A9.html">イジン召喚権</a>を増やせる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p>最低でもこれ自身の<a href="%E7%B7%91.html">緑</a>があるので1増やせる。組み合わせやすい<a href="%E9%BB%84.html">黄</a>のカードも戦場に置いておけば2増やせる。<a href="%E4%B8%89%E5%B1%A4%E3%81%AE%E8%88%8E%E5%88%A9%E6%AE%BF.html">三層の舎利殿</a>があれば4増やせる。</p>
<p><a href="%E7%AC%AC2%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第2弾</a>では<a href="%E7%B4%AB%E5%BE%AE%E5%9E%A3%E3%83%81%E3%83%A3%E3%83%BC%E3%82%B8.html">紫微垣チャージ</a>に採用される。また、<a href="%E6%B8%85%E5%B0%91%E7%B4%8D%E8%A8%80%E3%83%AD%E3%83%83%E3%82%AF.html">清少納言ロック</a>に採用されることもある。</p>
