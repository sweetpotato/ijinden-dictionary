<h1 class="title">リドロー</h1>
<div class="main">
<div id="content">
<p><a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドロー</a>しつつ<a href="%E5%A2%93%E5%9C%B0%E8%82%A5%E3%82%84%E3%81%97.html">墓地を肥やせる</a><a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>。</p>
<p><a href="%E9%9D%92%E9%BB%84%E5%BE%B4%E5%8B%9F.html">青黄徴募</a>では<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%82%BD%E3%83%BC%E3%82%B9.html">ドローソース</a>兼<a href="%E6%89%8B%E6%9C%AD.html">手札</a>の<a href="%E5%BE%B4%E5%8B%9F.html">徴募</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>を<a href="%E6%8D%A8%E3%81%A6%E3%82%8B.html">捨てる</a>ために使われる。ライバルは1枚多く捨てられる<a href="%E3%82%BD%E3%83%AA%E3%83%83%E3%83%89%E3%83%93%E3%82%B8%E3%83%A7%E3%83%B3%CE%B4.html">ソリッドビジョンδ</a>である。</p>
<p><a href="%E3%83%9E%E3%83%9B%E3%82%A6%E4%BD%BF%E7%94%A8.html">マホウ使用</a>して手札で発動したこれ自身を、これ自身の能力で捨てることはできない。</p>
<p>カード名は「再描画」。既存の結果の一部を破棄して改善することを、カードを引きつつ捨てることを掛けているか。</p>
