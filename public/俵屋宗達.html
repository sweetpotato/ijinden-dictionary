<h1 class="title">俵屋宗達</h1>
<div class="main">
<div id="content">
<p>自分の戦場の<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>に<a href="%E7%BE%8E%E8%A1%93.html">美術</a>を与える美術<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。美術ハイケイを<a href="%E5%B1%B1%E6%9C%AD%E3%81%AE%E4%B8%8B.html">山札の下</a>に<a href="%E6%88%BB%E3%81%99.html">戻して</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3%E5%8F%AC%E5%96%9A%E6%A8%A9.html">イジン召喚権</a>を増やせる能力も持つ。</p>
<p>2つの能力は噛み合っている。また、ハイケイを山札の下に戻すことは<a href="%E8%AB%B8%E8%91%9B%E4%BA%AE.html">諸葛亮</a>とも噛み合う。</p>
<p>1つ目の能力は<a href="%E9%A2%A8%E7%A5%9E%E9%9B%B7%E7%A5%9E%E5%9B%B3.html">風神雷神図</a>の能力を発動させやすくする。</p>
