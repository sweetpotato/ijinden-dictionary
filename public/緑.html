<h1 class="title">緑</h1>
<div class="main">
<div id="content">
<p>緑は<a href="%E3%82%A4%E3%82%B8%E3%83%B3%E3%83%87%E3%83%B3.html">イジンデン</a>における<a href="%E8%89%B2.html">色</a>のひとつである。</p>
<h2 id="解説">解説</h2>
<p><a href="%E7%AC%AC1%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第1弾</a>から存在する色である。この色の<a href="%E3%82%B9%E3%82%BF%E3%83%BC%E3%82%BF%E3%83%BC%E3%82%BB%E3%83%83%E3%83%88.html">スターターセット</a>は<a href="%E6%97%A5%E6%9C%AC%E3%81%AE%E5%A4%A7%E5%A4%A9%E6%89%8D.html">日本の大天才</a>デッキである。</p>
<p><a href="%E3%83%9D%E3%83%97%E3%83%AA.html">ポプリ</a>、<a href="%E3%82%A6%E3%83%83%E3%83%89%E3%82%B9%E3%82%BF%E3%83%83%E3%83%95.html">ウッドスタッフ</a>、<a href="%E3%82%AF%E3%83%AD%E3%83%AD%E3%82%AA%E3%83%BC%E3%83%A9.html">クロロオーラ</a>、[[歳星のピラー]]など、木のイメージを持つ。</p>
