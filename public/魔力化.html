<h1 class="title">魔力化</h1>
<div class="main">
<div id="content">
<p>魔力化は<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>のひとつであり、また<a href="%E3%82%AD%E3%83%BC%E3%83%AF%E3%83%BC%E3%83%89%E8%83%BD%E5%8A%9B.html">キーワード能力</a>のひとつである。魔力化を持つカードが<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>から<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>に置かれたとき、それを裏向きで<a href="%E9%AD%94%E5%8A%9B%E3%82%BE%E3%83%BC%E3%83%B3.html">魔力ゾーン</a>に置くことができる。<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF%E9%85%8D%E7%BD%AE%E6%A8%A9.html">マリョク配置権</a>は使わず、マリョク配置権が0でも発動できる。</p>
<h2 id="解説">解説</h2>
<p><a href="%E7%AC%AC1%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第1弾</a>から存在する、<a href="%E8%A3%8F%E9%AD%94%E5%8A%9B.html">裏魔力</a>になって<a href="%E9%AD%94%E5%8A%9B%E3%83%AC%E3%83%99%E3%83%AB.html">魔力レベル</a>を伸ばせる遺業能力である。</p>
