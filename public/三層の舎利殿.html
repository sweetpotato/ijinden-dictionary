<h1 class="title">三層の舎利殿</h1>
<div class="main">
<div id="content">
<p>3つの能力を持つ<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>。</p>
<p>1つ目の能力は自分の<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>の色を水増しする。同じ<a href="%E7%AC%AC2%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第2弾</a>の<a href="%E3%82%B9%E3%82%AB%E3%83%BC%E3%83%AC%E3%83%83%E3%83%88.html">スカーレット</a>、<a href="%E3%83%94%E3%83%BC%E3%82%B3%E3%83%83%E3%82%AF.html">ピーコック</a>、<a href="%E3%82%B7%E3%83%A3%E3%83%88%E3%83%AB%E3%83%BC%E3%82%BA.html">シャトルーズ</a>とは相性が良い。特に<a href="%E3%82%B9%E3%82%AB%E3%83%BC%E3%83%AC%E3%83%83%E3%83%88%E5%9F%B7%E7%AD%86.html">スカーレット執筆</a>では必須級のハイケイである。</p>
<p>2つ目の能力と3つ目の能力は次に引くカードの質を上げられる。また、積極的に<a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊して</a><a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>で<a href="%E5%B1%B1%E6%9C%AD.html">山札</a>に<a href="%E6%88%BB%E3%81%99.html">戻せる</a>ので、山札の修復にも使える。</p>
<p>2つ目の能力の発動は強制である。発動を忘れないようにしたい。</p>
<p>元ネタは<a href="%E8%B6%B3%E5%88%A9%E7%BE%A9%E6%BA%80.html">足利義満</a>と関わりの深い鹿苑寺の金閣か。</p>
