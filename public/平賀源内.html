<p><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>か<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>を<a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊できる</a>イジン。</p>
<p>破壊できるイジンの範囲は狭いが、相手の初動の<a href="%E3%83%8F%E3%83%AA%E3%82%A8%E3%83%83%E3%83%88%E3%83%BB%E3%83%93%E3%83%BC%E3%83%81%E3%83%A3%E3%83%BC%E3%83%BB%E3%82%B9%E3%83%88%E3%82%A6.html">ハリエット・ビーチャー・ストウ</a>や[[ジョバンニ＝ディ＝メディチ]]を後攻1ターン目に除去できる貴重な<a href="%E8%B5%A4.html">赤</a>のカードである。[[ラ・コロール]]や[[ディ・クローネ]]の採用が難しい場合の候補として頭に入れておきたい。</p>
