<div class="main">
<div id="content">
<p>召喚の際の<a href="%E3%83%AC%E3%83%99%E3%83%AB%E8%BB%BD%E6%B8%9B.html">レベル軽減</a>能力と、<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>に置かれたときに戦場の<a href="%E7%BE%8E%E8%A1%93.html">美術</a>カードを回収する能力を持つ美術<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p>他のイジンに美術を与えられる<a href="%E5%B0%8F%E9%87%8E%E5%B0%8F%E7%94%BA.html">小野小町</a>と一緒に使うと、回収できるカードの幅を広げられる。これを利用した無限コンボも存在する[1]。</p>
