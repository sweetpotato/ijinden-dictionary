<h1 class="title">名前</h1>
<div class="main">
<div id="content">
<p>名前（カード名）は<a href="%E5%BA%83%E7%BE%A9%E3%81%AE%E7%89%B9%E6%80%A7.html">広義の特性</a>のひとつであり、<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>の上の方に記されている。</p>
<h2 id="解説">解説</h2>
<p>カードを識別するための情報である。ただし、同じ名前であっても、名前以外の広義の特性が異なるカードが存在することに注意されたい。このようなカードは<a href="%E6%96%B0%E6%97%A7.html">新旧</a>をつけて区別されることがある。<a href="%E3%82%AB%E3%83%BC%E3%83%89%E7%95%AA%E5%8F%B7.html">カード番号</a>を用いればより確実である。</p>
<p>同じ名前のカードは、特記ない限り、<a href="%E3%83%87%E3%83%83%E3%82%AD.html">デッキ</a>に4枚まで入れられる。名前以外の広義の特性が異なっていても、名前が同じであれば一緒に数える。</p>
<p><a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>の名前は、<a href="%E7%AC%AC5%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第5弾</a>現在、すべてカタカナで統一されている。</p>
</div>
