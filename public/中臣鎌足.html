<h1 class="title">中臣鎌足</h1>
<div class="main">
<div id="content">
<p><a href="%E5%B1%B1%E6%9C%AD.html">山札</a>を削って<a href="%E5%8D%B3%E5%BF%9C.html">即応</a>を得られる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p><a href="%E5%A2%93%E5%9C%B0%E8%82%A5%E3%82%84%E3%81%97.html">墓地肥やし</a>ができるので、<a href="%E3%83%AC%E3%82%AA%E3%83%8A%E3%83%AB%E3%83%89%E3%83%BB%E3%83%80%E3%83%BB%E3%83%B4%E3%82%A3%E3%83%B3%E3%83%81.html">レオナルド・ダ・ヴィンチ</a>とは相性が良い。<a href="%E7%AC%AC1%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第1弾</a>では赤青型の[[ダヴィンチリバイバル]]に採用される。また、[[張角]]がいれば<a href="%E5%86%A5%E5%BA%9C%E7%99%BA%E5%8B%95.html">冥府発動</a>のチャンスがある。</p>
<p>「自分の山札の上から5枚を墓地に置」くことは[[発動の手続]]である。したがって山札が4枚以下の場合は発動できない（Q&amp;A参照）。</p>
<h2 id="QA">Q&amp;A</h2>
<p>Q. 山札が4枚しかなくても発動できるのか。</p>
<p>A. 発動できません。自分の山札の上から5枚を墓地に置かなければ能力の条件を満たせません。4枚だけを墓地に置くこともできません。</p>
