<h1 class="title">レッドストーン</h1>
<div class="main">
<div id="content">
<p><a href="%E8%B5%A4.html">赤</a>の基本的な<a href="%E3%80%8E%E3%82%B9%E3%83%88%E3%83%BC%E3%83%B3%E3%80%8F%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF.html">『ストーン』マリョク</a>。<a href="%E6%96%B0%E6%97%A7.html">新旧</a>とも同じ<a href="%E3%83%AB%E3%83%BC%E3%83%AB%E3%83%86%E3%82%AD%E3%82%B9%E3%83%88.html">ルールテキスト</a>、同じ性能である。</p>
<p>典型的には<a href="%E3%83%AC%E3%83%83%E3%83%89%E3%82%AA%E3%83%BC%E3%83%96.html">レッドオーブ</a>や[[RYマーブルストーン]]の[[下位互換]]であり、所持カードが充実するにつれて使われなくなっていくカードだろう。</p>
<p>[[シールド]]、[[ドラフト]]、[[スターター限定構築]]、[[ストーン限定構築]]ではお世話になるだろう。</p>
