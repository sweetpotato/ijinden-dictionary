<h1 class="title">明智光秀</h1>
<div class="main">
<div id="content">
<p><a href="%E5%8D%B3%E5%BF%9C.html">即応</a>持ちの<a href="%E5%89%A3%E8%A1%93.html">剣術</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。ただし自分の<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>が減るデメリットつき。</p>
<p>デメリットがあるとはいえ、1ターン目に召喚できる<a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>3000のイジンであり、自分が<a href="%E5%BE%8C%E6%94%BB.html">後攻</a>でも相手の初動イジンに阻まれることなく<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>になれる可能性が高い。そのため、<a href="%E6%BA%90%E7%BE%A9%E7%B5%8C.html">源義経</a>の代わりに[[赤単アグロ]]に採用できる。</p>
<p>ガーディアンが減るので<a href="%E5%86%86%E5%BD%A2%E9%97%98%E6%8A%80%E5%A0%B4.html">円形闘技場</a>とは相性が悪く、[[赤青闘技場]]には採用しづらい。</p>
<p>[[炎上がる天守閣]]があればガーディアンを戻さずに済む。しかし、あちらは<a href="%E3%83%AC%E3%83%99%E3%83%AB.html">レベル</a>3のため、使えるターンの噛み合いが良くない。</p>
