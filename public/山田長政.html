<h1 class="title">山田長政</h1>
<div class="main">
<div id="content">
<p><a href="%E8%88%AA%E6%B5%B7.html">航海</a>で相手の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>にブロックを強制するイジン。</p>
<p>上手に使えば、<a href="%E3%83%90%E3%83%88%E3%83%AB.html">バトル</a>で<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>にも<a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AB%E3%83%BC.html">ブロッカー</a>にも積極的に選ばれることがない、いわゆるシステムイジンを除去できる。ただし、指定したイジン以外のイジンがこれをブロックすることは防げないので、複数のブロッカーによって打ち取られてしまう可能性はあることに注意したい。</p>
