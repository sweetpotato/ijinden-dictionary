<h1 class="title">パワー</h1>
<div class="main">
<div id="content">
<p>パワーは<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>が持つ<a href="%E5%BA%83%E7%BE%A9%E3%81%AE%E7%89%B9%E6%80%A7.html">広義の特性</a>のひとつであり、<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>の右下に数字で記されている。イジンでないカードはパワーを持たない。</p>
<h2 id="解説">解説</h2>
<p><a href="%E3%83%90%E3%83%88%E3%83%AB.html">バトル</a>における強さを示す数値であり、大きいほど強い。</p>
<p>パワーは<a href="%E3%83%91%E3%83%AF%E3%83%BC%EF%BC%8B.html">パワー＋</a>、<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AF%EF%BC%8B.html">アタック＋</a>、および<a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AF%EF%BC%8B.html">ブロック＋</a>によって増加する。パワーを参照する能力はこれらの能力によって増加した最終的なパワーの値を参照する。</p>
<p>パワーが0のイジンも存在する（例：[[フローレンス・ナイチンゲール]]）。そのような戦場のイジンは、パワーが0であることによっては墓地に置かれない。</p>
<p>パワーを減少させる能力は、<a href="%E7%AC%AC5%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第5弾</a>現在では存在しない。</p>
</div>
