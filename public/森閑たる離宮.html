<div class="main">
<div id="content">
<p><a href="%E5%86%A5%E5%BA%9C%E7%99%BA%E5%8B%95.html">冥府発動</a>でない<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>を妨害しつつ<a href="%E3%83%8F%E3%83%B3%E3%83%87%E3%82%B9.html">ハンデス</a>もする<a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>。効果は相手だけでなく自分にも及ぶ。</p>
<p><a href="%E8%B5%A4.html">赤</a>の<a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊</a><a href="%E9%99%A4%E5%8E%BB.html">除去</a>と一緒に使えば、相手の<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>と<a href="%E6%89%8B%E6%9C%AD.html">手札</a>に同時に損害を与えられる。これを狙ったデッキが<a href="%E8%B5%A4%E7%B4%AB%E9%9B%A2%E5%AE%AE.html">赤紫離宮</a>である。</p>
<p>元ネタは二条城の二の丸御殿か。</p>
