<h1 class="title">ヴォルフガング・アマデウス・モーツァルト</h1>
<div class="main">
<div id="content">
<p>相手の<a href="%E9%9F%B3%E6%A5%BD.html">音楽</a><a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>と<a href="%E5%A2%93%E5%9C%B0.html">墓地</a>のカードの<a href="%E8%83%BD%E5%8A%9B%E3%82%92%E5%A4%B1%E3%81%86.html">能力を失わせる</a>音楽イジン。</p>
<p>墓地に置かれたときの能力も失わせて妨害できる。<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>はもちろん、[[遠征軍]]にも効くので、相手の<a href="%E5%B1%B1%E6%9C%AD.html">山札</a>を削ることで<a href="%E5%B1%B1%E6%9C%AD%E5%88%87%E3%82%8C.html">山札切れ</a>を狙うデッキに採用されることがある。</p>
<p><a href="%E3%83%A8%E3%83%8F%E3%83%B3%E3%83%BB%E3%82%BC%E3%83%90%E3%82%B9%E3%83%86%E3%82%A3%E3%82%A2%E3%83%B3%E3%83%BB%E3%83%90%E3%83%83%E3%83%8F.html">ヨハン・ゼバスティアン・バッハ</a>とあわせて使えば、相手のイジンすべての能力を失わせることができる。</p>
