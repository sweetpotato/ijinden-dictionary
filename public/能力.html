<h1 class="title">能力</h1>
<div class="main">
<div id="content">
<p>能力とは、<a href="%E3%82%AB%E3%83%BC%E3%83%89.html">カード</a>が持つ、<a href="%E3%82%B2%E3%83%BC%E3%83%A0.html">ゲーム</a>に影響を与える力である。能力は<a href="%E3%83%AB%E3%83%BC%E3%83%AB%E3%83%86%E3%82%AD%E3%82%B9%E3%83%88.html">ルールテキスト</a>欄や<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>欄によって定義される。</p>
<p>能力には大別して<a href="%E7%99%BA%E5%8B%95%E5%9E%8B%E8%83%BD%E5%8A%9B.html">発動型能力</a>と<a href="%E5%B8%B8%E5%9C%A8%E5%9E%8B%E8%83%BD%E5%8A%9B.html">常在型能力</a>がある。</p>
