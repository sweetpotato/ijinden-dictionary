<h1 class="title">クレオパトラ</h1>
<div class="main">
<div id="content">
<p><a href="%E3%83%8F%E3%82%A4%E3%82%B1%E3%82%A4.html">ハイケイ</a>を大量<a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊</a>できる<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。破壊した数だけ<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドロー</a>もする。</p>
<p>1つ目の破壊能力と2つ目のドロー能力は独立である。なので、これ以外の能力でハイケイが破壊されてもドローする。</p>
<p>2つ目のドロー能力は強制である。<a href="%E5%B1%B1%E6%9C%AD%E5%88%87%E3%82%8C.html">山札切れ</a>には注意したい。</p>
<p><a href="%E7%AC%AC4%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第4弾</a>では<a href="%E8%97%A9%E6%A0%A1%E3%83%91%E3%83%88%E3%83%A9.html">藩校パトラ</a>に採用される。</p>
