<h1 class="title">山札</h1>
<div class="main">
<div id="content">
<p>山札は<a href="%E5%A0%B4%E6%89%80.html">場所</a>のひとつであり、<a href="%E3%82%B2%E3%83%BC%E3%83%A0.html">ゲーム</a>を始める際に<a href="%E3%83%87%E3%83%83%E3%82%AD.html">デッキ</a>を置くところである。山札は非公開場所であり、どの<a href="%E3%83%97%E3%83%AC%E3%82%A4%E3%83%A4%E3%83%BC.html">プレイヤー</a>も表面を見ることができない。</p>
<h2 id="解説">解説</h2>
<p><a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%83%95%E3%82%A7%E3%82%A4%E3%82%BA.html">ドローフェイズ</a>や<a href="%E3%83%89%E3%83%AD%E3%83%BC%E3%81%99%E3%82%8B.html">ドローする</a>能力でカードを引いてくる場所である。</p>
<p><a href="%E3%83%87%E3%83%83%E3%82%AD.html">デッキ</a>と山札は混同しがちだが異なる概念である。デッキはゲーム開始前のカードの束を、山札はゲーム開始後の場所をいう。</p>
<p>山札のカードの表面は見ることができないが、裏のまま枚数を数えることはいつでもできる。不正を疑われないように、数える際は相手に断りを入れてからにしよう。</p>
<p><a href="%E5%B1%B1%E6%9C%AD%E5%88%87%E3%82%8C.html">山札切れ</a>による敗北のルールが存在する。詳細は当該項目を参照されたい。</p>
</div>
