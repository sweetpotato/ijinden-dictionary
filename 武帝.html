<div class="main">
<div id="content">
<blockquote>
<p>B-7</p>
<p>武帝</p>
<p>イジン／青／3</p>
<p>自分の戦場のイジン1体につき「パワー+1000」を得る。</p>
<p>パワー5000以上の間「ダブルプレッシャー」を得る。</p>
<p>2000</p>
</blockquote>
<p>自分の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>が増えるほど<a href="%E3%83%91%E3%83%AF%E3%83%BC.html">パワー</a>が強くなるイジン。5000以上なら<a href="%E3%83%80%E3%83%96%E3%83%AB%E3%83%97%E3%83%AC%E3%83%83%E3%82%B7%E3%83%A3%E3%83%BC.html">ダブルプレッシャー</a>も得られる。</p>
<p>これ自身も数えるので、少なくとも<a href="%E3%83%91%E3%83%AF%E3%83%BC%EF%BC%8B.html">パワー＋</a>1000は得られる。</p>
<p>イジンの数を一気に増やせる<a href="%E5%86%86%E5%BD%A2%E9%97%98%E6%8A%80%E5%A0%B4.html">円形闘技場</a>とは相性が良い。</p>
