<h1 class="title">ドレイン</h1>
<div class="main">
<div id="content">
<p>ドレインは<a href="%E5%B8%B8%E5%9C%A8%E5%9E%8B%E8%83%BD%E5%8A%9B.html">常在型能力</a>であり、また<a href="%E3%82%AD%E3%83%BC%E3%83%AF%E3%83%BC%E3%83%89%E8%83%BD%E5%8A%9B.html">キーワード能力</a>のひとつである。ドレインを持つ<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>が<a href="%E3%83%90%E3%83%88%E3%83%AB%E8%A7%A3%E6%B1%BA.html">バトル解決</a>で<a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊した</a>相手のカードの<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>は発動しない。</p>
<h2 id="解説">解説</h2>
<p><a href="%E7%AC%AC5%E5%BC%BE%E3%83%96%E3%83%BC%E3%82%B9%E3%82%BF%E3%83%BC%E3%83%91%E3%83%83%E3%82%AF.html">第5弾</a>で追加された、相手の遺業能力を無力化する能力である。<a href="%E5%86%A5%E5%BA%9C%E7%99%BA%E5%8B%95.html">冥府発動</a>などの強力な遺業能力の可能性があっても気にせずにアタックできるようになる。</p>
<h2 id="ルール">ルール</h2>
<p><a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>であったか<a href="%E3%83%96%E3%83%AD%E3%83%83%E3%82%AB%E3%83%BC.html">ブロッカー</a>であったか、また（一方的に）勝ったか（双方とも）負けたかは問わない。</p>
<p>ドレインは重複しない。何らかの理由で1体のイジンが2つ以上のドレインを得ても、1つだけ得た場合と変わりはない。</p>
