<h1 class="title">ネハン</h1>
<div class="main">
<div id="content">
<blockquote>
<p>Y-11</p>
<p>ネハン</p>
<p>マホウ／黄／2／魔力コスト1</p>
<p>戦場の寝ているカード1つを指定して発動できる。そのカードを山札の下に戻す。</p>
<p>遺業能力：冥府発動</p>
</blockquote>
<p><a href="%E5%AF%9D%E3%81%A6%E3%81%84%E3%82%8B.html">寝ている</a>カードを<a href="%E5%B1%B1%E6%9C%AD%E3%81%AE%E4%B8%8B.html">山札の下</a>に<a href="%E9%99%A4%E5%8E%BB.html">除去</a>できる<a href="%E3%83%9E%E3%83%9B%E3%82%A6.html">マホウ</a>。<a href="%E9%81%BA%E6%A5%AD%E8%83%BD%E5%8A%9B.html">遺業能力</a>を発動させず、また<a href="%E3%83%AA%E3%82%A2%E3%83%8B%E3%83%A1%E3%82%A4%E3%83%88.html">リアニメイト</a>や墓地回収も防げる。</p>
<p>通常、<a href="%E5%AF%9D%E3%81%8B%E3%81%9B%E3%82%8B.html">寝る</a>ことがあるカードは<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>なので、基本的にはイジン除去として使うことになるだろう。</p>
<p>カード名は悟りの境地である「涅槃」。</p>
