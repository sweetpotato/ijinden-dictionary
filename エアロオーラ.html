<h1 class="title">エアロオーラ</h1>
<div class="main">
<div id="content">
<blockquote>
<p>3-70</p>
<p>エアロオーラ</p>
<p>マホウ／紫／2／魔力コスト1</p>
<p>1ドローする。</p>
<p>マホウ使用によって墓地に置かれる際「冥装」を得た状態で墓地に置かれる。</p>
<p>装備 : これが紫の間「ダブルプレッシャー アタック+2000」を得る。</p>
<p>遺業能力：魔力化</p>
</blockquote>
<p><a href="%E7%B4%AB.html">紫</a>の<a href="%E3%82%AA%E3%83%BC%E3%83%A9%E3%83%9E%E3%83%9B%E3%82%A6.html">オーラマホウ</a>。<a href="%E5%86%A5%E8%A3%85.html">冥装</a>で[[装備]]させれば紫の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>に<a href="%E3%83%80%E3%83%96%E3%83%AB%E3%83%97%E3%83%AC%E3%83%83%E3%82%B7%E3%83%A3%E3%83%BC.html">ダブルプレッシャー</a>と<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AF%EF%BC%8B.html">アタック＋</a>を与える。</p>
<p><a href="%E3%83%80%E3%83%B3%E3%83%80%E3%83%A9%E7%BE%BD%E7%B9%94.html">ダンダラ羽織</a>とは異なり、自分の<a href="%E3%82%AC%E3%83%BC%E3%83%87%E3%82%A3%E3%82%A2%E3%83%B3.html">ガーディアン</a>が残っていてもダブルプレッシャーを与える。</p>
<p>カード名の「エアロ」は「空気」。</p>
