<h1 class="title">ビスマルク</h1>
<div class="main">
<div id="content">
<blockquote>
<p>1-70</p>
<p>ビスマルク</p>
<p>イジン／赤／3</p>
<p>ダブルプレッシャー</p>
<p>アタッカーになったとき、自分の戦場のイジン1体を破壊する。</p>
<p>3000</p>
</blockquote>
<p><a href="%E3%83%80%E3%83%96%E3%83%AB%E3%83%97%E3%83%AC%E3%83%83%E3%82%B7%E3%83%A3%E3%83%BC.html">ダブルプレッシャー</a>を持つが、<a href="%E3%82%A2%E3%82%BF%E3%83%83%E3%82%AB%E3%83%BC.html">アタッカー</a>になったときのペナルティも持つ<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>。</p>
<p><a href="%E7%A0%B4%E5%A3%8A%E3%81%99%E3%82%8B.html">破壊する</a>のは強制である。自分の<a href="%E6%88%A6%E5%A0%B4.html">戦場</a>にこれしかいない場合、これ自身を破壊する必要がある。</p>
<p>[[発動の手続]]で指定することなく破壊するので、<a href="%E7%A0%B4%E5%A3%8A%E3%81%95%E3%82%8C%E3%81%AA%E3%81%84.html">破壊されない</a>イジンは選べない。</p>
<p>自分の<a href="%E3%83%9E%E3%83%AA%E3%83%BC%E3%83%BB%E3%82%A2%E3%83%B3%E3%83%88%E3%83%AF%E3%83%8D%E3%83%83%E3%83%88.html">マリー・アントワネット</a>を破壊すれば、デメリットをメリットに変えられる可能性がある。</p>
