<h1 class="title">物理的な状態</h1>
<div class="main">
<div id="content">
<p>カードの「物理的な状態」とは、このサイトで使われる<strong>非公式</strong>のルール用語であり、次の相称である：</p>
<ul class="list1">
<li><a href="%E8%A1%A8%E5%90%91%E3%81%8D.html">表向き</a>か<a href="%E8%A3%8F%E5%90%91%E3%81%8D.html">裏向き</a>か</li>
<li><a href="%E8%B5%B7%E3%81%8D%E3%81%A6%E3%81%84%E3%82%8B.html">起きている</a>か<a href="%E5%AF%9D%E3%81%A6%E3%81%84%E3%82%8B.html">寝ている</a>か</li>
<li><a href="%E7%A0%B4%E5%A3%8A%E3%81%95%E3%82%8C%E3%81%A6%E3%81%84%E3%81%AA%E3%81%84.html">破壊されていない</a>か<a href="%E7%A0%B4%E5%A3%8A%E3%81%95%E3%82%8C%E3%81%A6%E3%81%84%E3%82%8B.html">破壊されている</a>か</li>
</ul>
<p><a href="%E6%88%A6%E5%A0%B4.html">戦場</a>のカードはこれら3種すべての状態を持つ。<a href="%E9%AD%94%E5%8A%9B%E3%82%BE%E3%83%BC%E3%83%B3.html">魔力ゾーン</a>のカードは表向きか裏向きかの状態のみを持つ。それ以外の<a href="%E5%A0%B4%E6%89%80.html">場所</a>のカードは物理的な状態を持たない。</p>
</div>
</div>
