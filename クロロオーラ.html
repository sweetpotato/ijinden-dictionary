<blockquote>
<p>3-66</p>
<p>クロロオーラ</p>
<p>マホウ／緑／2／魔力コスト1</p>
<p>1ドローする。</p>
<p>マホウ使用によって墓地に置かれる際「冥装」を得た状態で墓地に置かれる。</p>
<p>装備 : これが緑の間「パワー+3000」を得る。</p>
<p>遺業能力：魔力化</p>
</blockquote>
<p><a href="%E7%B7%91.html">緑</a>の<a href="%E3%82%AA%E3%83%BC%E3%83%A9%E3%83%9E%E3%83%9B%E3%82%A6.html">オーラマホウ</a>。<a href="%E5%86%A5%E8%A3%85.html">冥装</a>で[[装備]]させれば緑の<a href="%E3%82%A4%E3%82%B8%E3%83%B3.html">イジン</a>に<a href="%E3%83%91%E3%83%AF%E3%83%BC%EF%BC%8B.html">パワー＋</a>を与える。</p>
<p><a href="%E7%94%B0%E6%B2%BC%E6%84%8F%E6%AC%A1.html">田沼意次</a>に装備させれば<a href="%E3%83%9E%E3%83%AA%E3%83%A7%E3%82%AF%E9%85%8D%E7%BD%AE%E6%A8%A9.html">マリョク配置権</a>を増やす能力を得られる。</p>
<p>カード名の「クロロ」は「緑」。</p>
